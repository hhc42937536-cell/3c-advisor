<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3C 選購小幫手 — 捷啟智慧科技</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF8F0;
    --surface: #FFFFFF;
    --card: #FFFFFF;
    --card2: #FFF0E0;
    --border: #F0DCC8;
    --accent: #FF8C42;
    --accent2: #5B9BD5;
    --green: #4CAF50;
    --orange: #FF9800;
    --red: #E53935;
    --text: #3E2723;
    --text2: #5D4037;
    --text3: #8D6E63;
    --pros-bg: #E8F5E9;
    --cons-bg: #FFF3E0;
    --white: #3E2723;
    --gold: #FF8F00;
    --shadow: 0 2px 12px rgba(62,39,35,0.08);
    --shadow-hover: 0 4px 20px rgba(255,140,66,0.18);
    --hero-g1: #FF8C42;
    --hero-g2: #FFB74D;
    --hero-text: #FFFFFF;
  }
  .dark-mode {
    --bg: #2D2420;
    --surface: #3D3530;
    --card: #4A3F38;
    --card2: #5A4D44;
    --border: #6D5D52;
    --text: #FFF0E0;
    --text2: #E8D5C4;
    --text3: #BFA48E;
    --white: #FFF0E0;
    --pros-bg: #2A3D2A;
    --cons-bg: #3D2A1A;
    --shadow: 0 2px 12px rgba(0,0,0,0.25);
    --shadow-hover: 0 4px 20px rgba(255,140,66,0.25);
    --hero-g1: #8B4513;
    --hero-g2: #A0522D;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
    font-size: 16px;
    line-height: 1.6;
  }
  /* ─── Topbar ─── */
  #topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface);
    box-shadow: var(--shadow);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-icon { font-size: 28px; }
  .topbar-title { font-size: 19px; font-weight: 900; color: var(--accent); }
  .topbar-sub {
    background: var(--card2); border-radius: 20px;
    padding: 4px 14px; font-size: 12px; color: var(--text2); font-weight: 500;
  }
  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .nav-btn {
    padding: 8px 14px; border-radius: 12px;
    background: var(--card2); border: none; cursor: pointer;
    color: var(--text2); font-size: 14px; font-family: inherit;
    font-weight: 500; transition: all 0.2s; min-height: 40px;
  }
  .nav-btn:hover { background: var(--accent); color: #fff; }
  .theme-btn {
    background: var(--card2); border-radius: 20px;
    padding: 8px 16px; font-size: 14px;
    border: none; cursor: pointer; color: var(--text2);
    font-family: inherit; font-weight: 500; min-height: 40px;
    transition: all 0.2s;
  }
  .theme-btn:hover { background: var(--accent); color: #fff; }
  /* ─── Stepper ─── */
  #stepper {
    background: var(--surface);
    box-shadow: 0 1px 4px rgba(62,39,35,0.05);
    padding: 16px;
    display: flex; align-items: center; justify-content: center;
    gap: 0; overflow-x: auto;
  }
  .step-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .step-dot {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff;
    cursor: pointer; transition: all 0.2s;
    background: var(--border);
  }
  .step-dot.done { background: var(--green); }
  .step-dot.active { background: var(--accent); box-shadow: 0 2px 8px rgba(255,140,66,0.4); }
  .step-label { font-size: 11px; color: var(--text3); white-space: nowrap; font-weight: 500; }
  .step-label.active { color: var(--accent); font-weight: 700; }
  .step-label.done { color: var(--green); }
  .step-line {
    width: 32px; height: 3px; background: var(--border); margin: 0 2px;
    margin-bottom: 16px; transition: background 0.3s; border-radius: 2px;
  }
  .step-line.done { background: var(--green); }
  /* ─── Hero ─── */
  .hero {
    padding: 40px 24px 32px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    text-align: center;
    border-radius: 0 0 32px 32px;
  }
  .hero-emoji { font-size: 56px; }
  .hero-title { font-size: 26px; font-weight: 900; color: var(--hero-text); }
  .hero-sub { font-size: 15px; color: rgba(255,255,255,0.85); font-weight: 500; }
  /* ─── Grid ─── */
  .option-grid {
    display: flex; flex-wrap: wrap; gap: 14px;
    justify-content: center; padding: 16px 20px 24px;
  }
  .option-card {
    width: 170px; min-height: 150px;
    background: var(--card);
    box-shadow: var(--shadow);
    border: 2px solid transparent; border-radius: 20px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; padding: 18px 14px;
    cursor: pointer; transition: all 0.2s;
    text-align: center;
  }
  .option-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-3px); }
  .option-card.selected {
    background: var(--card2);
    border: 2px solid var(--accent);
    box-shadow: var(--shadow-hover);
  }
  .option-emoji { font-size: 42px; }
  .option-main { font-size: 17px; font-weight: 700; color: var(--text); }
  .option-card.selected .option-main { color: var(--accent); }
  .option-sub { font-size: 13px; color: var(--text3); font-weight: 500; }
  .option-card.selected .option-sub { color: var(--text2); }
  /* ─── App checkbox grid ─── */
  .app-categories { padding: 0 20px 24px; display: flex; flex-direction: column; gap: 16px; }
  .app-cat-title {
    font-size: 15px; font-weight: 700; color: var(--text2);
    padding: 8px 0 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .app-items { display: flex; flex-wrap: wrap; gap: 10px; }
  .app-chip {
    padding: 10px 18px; border-radius: 24px;
    background: var(--card); box-shadow: var(--shadow);
    border: 2px solid transparent;
    font-size: 14px; color: var(--text2); cursor: pointer;
    transition: all 0.15s; user-select: none; font-weight: 500;
    min-height: 44px; display: flex; align-items: center;
  }
  .app-chip:hover { border-color: var(--accent); }
  .app-chip.checked {
    background: var(--accent); border-color: var(--accent);
    color: #fff; font-weight: 700;
  }
  /* ─── Life scenario chips (new) ─── */
  .scenario-grid {
    display: flex; flex-wrap: wrap; gap: 12px;
    justify-content: center; padding: 0 20px 24px;
  }
  .scenario-card {
    width: 160px; min-height: 120px;
    background: var(--card); box-shadow: var(--shadow);
    border: 2px solid transparent; border-radius: 20px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; padding: 16px 12px;
    cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .scenario-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
  .scenario-card.selected { border-color: var(--accent); background: var(--card2); }
  .scenario-emoji { font-size: 36px; }
  .scenario-main { font-size: 15px; font-weight: 700; color: var(--text); }
  .scenario-card.selected .scenario-main { color: var(--accent); }
  .scenario-sub { font-size: 12px; color: var(--text3); }
  /* ─── Budget tips ─── */
  .budget-tips {
    background: var(--card); box-shadow: var(--shadow);
    border-radius: 16px; padding: 16px; margin: 0 20px 16px;
  }
  .budget-tips-title { font-size: 15px; font-weight: 700; color: var(--text2); margin-bottom: 10px; }
  .budget-tip-row { display: flex; gap: 10px; padding: 6px 0; font-size: 14px; }
  .budget-tip-label { color: var(--accent); font-weight: 700; min-width: 190px; }
  .budget-tip-desc { color: var(--text3); }
  /* ─── Warning box ─── */
  .warn-box {
    background: var(--pros-bg); border-radius: 16px; padding: 14px 16px;
    color: var(--green); font-size: 14px; margin: 0 20px 12px;
    font-weight: 500; box-shadow: var(--shadow);
  }
  .budget-warn { background: var(--cons-bg); color: var(--orange); }
  /* ─── Prefs ─── */
  .pref-section { padding: 0 20px 20px; }
  .pref-section-title {
    font-size: 16px; font-weight: 700; color: var(--text2);
    padding: 14px 0 10px;
  }
  .pref-chips { display: flex; flex-wrap: wrap; gap: 10px; }
  .pref-chip {
    padding: 10px 18px; border-radius: 24px;
    background: var(--card); box-shadow: var(--shadow);
    border: 2px solid transparent;
    font-size: 14px; color: var(--text2); cursor: pointer;
    transition: all 0.15s; font-weight: 500;
    min-height: 44px; display: flex; align-items: center;
  }
  .pref-chip:hover { border-color: var(--accent); }
  .pref-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
  /* ─── Buttons ─── */
  .btn-primary {
    background: var(--accent); color: #fff;
    border: none; border-radius: 16px;
    padding: 16px 36px; font-size: 17px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: all 0.18s; min-height: 52px;
    box-shadow: 0 4px 12px rgba(255,140,66,0.3);
  }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-2px); }
  .btn-secondary {
    background: var(--card2); color: var(--accent);
    border: 2px solid var(--accent); border-radius: 16px;
    padding: 14px 28px; font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: all 0.18s; min-height: 48px;
  }
  .btn-secondary:hover { background: var(--accent); color: #fff; }
  .btn-center { display: flex; justify-content: center; padding: 16px 20px; gap: 12px; flex-wrap: wrap; }
  /* ─── Quick pick button ─── */
  .quick-pick-btn {
    background: linear-gradient(135deg, var(--accent2), #7B68EE);
    color: #fff; border: none; border-radius: 20px;
    padding: 18px 32px; font-size: 18px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 16px rgba(91,155,213,0.35);
    transition: all 0.2s; min-height: 56px;
    display: flex; align-items: center; gap: 10px;
  }
  .quick-pick-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
  /* ─── Product card ─── */
  .product-card {
    background: var(--card);
    box-shadow: var(--shadow);
    border: 2px solid transparent;
    border-radius: 20px; padding: 20px; margin-bottom: 16px;
    transition: all 0.2s;
  }
  .product-card.top-pick { border-color: var(--gold); box-shadow: 0 4px 20px rgba(255,143,0,0.2); }
  .product-card.ai-pick { border-color: var(--accent2); box-shadow: 0 4px 20px rgba(91,155,213,0.2); }
  .product-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
  .product-brand { font-size: 13px; font-weight: 700; color: var(--accent); }
  .product-name { font-size: 20px; font-weight: 900; color: var(--text); margin: 4px 0; }
  .product-spec { font-size: 13px; color: var(--text3); margin-top: 6px; }
  .product-right { text-align: right; }
  .price-label {
    display: inline-block; padding: 4px 12px; border-radius: 10px;
    font-size: 12px; font-weight: 700; color: #fff; margin-bottom: 6px;
  }
  .price-val { font-size: 24px; font-weight: 900; color: var(--white); }
  .battery-weight { font-size: 13px; color: var(--text3); margin-top: 6px; }
  /* ─── Plain spec (new) ─── */
  .plain-spec {
    background: var(--card2); border-radius: 14px; padding: 14px 16px;
    margin: 12px 0; display: flex; flex-direction: column; gap: 6px;
  }
  .plain-spec-title { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .plain-spec-row { font-size: 14px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
  .plain-spec-row span { font-size: 18px; }
  .badges { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
  .badge {
    padding: 5px 12px; border-radius: 10px;
    font-size: 13px; font-weight: 700;
    background: var(--accent); color: #fff;
  }
  .badge.secondary { background: var(--card2); color: var(--text2); }
  .badge.tag { background: #FFF3E0; color: var(--gold); }
  .badge.editor { background: #FFF3E0; color: var(--gold); }
  /* ─── Pros/cons ─── */
  .pros-cons { display: flex; gap: 10px; margin: 12px 0; flex-wrap: wrap; }
  .pros-box, .cons-box {
    flex: 1; min-width: 160px;
    border-radius: 14px; padding: 12px; font-size: 14px;
  }
  .pros-box { background: var(--pros-bg); }
  .cons-box { background: var(--cons-bg); }
  .pros-title { color: var(--green); font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .cons-title { color: var(--orange); font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .pros-text { color: var(--text); }
  .cons-text { color: var(--text); }
  /* ─── Score bars ─── */
  .score-section {
    background: var(--surface); box-shadow: var(--shadow);
    border-radius: 14px; padding: 16px; margin: 12px 0;
  }
  .score-section-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
  .score-row { margin-bottom: 10px; }
  .score-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
  .score-label { color: var(--text2); font-weight: 500; }
  .score-val { font-weight: 700; }
  .score-bar { height: 8px; border-radius: 4px; background: var(--card2); overflow: hidden; }
  .score-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  /* ─── Freshness ─── */
  .freshness-bar {
    display: flex; align-items: center; gap: 8px;
    border-radius: 14px; padding: 12px 16px;
    font-size: 14px; font-weight: 700; margin: 10px 0;
    border: 2px solid;
  }
  /* ─── Compat ─── */
  .compat-box {
    background: var(--surface); border-radius: 14px;
    padding: 16px; margin: 10px 0; border: 2px solid;
    box-shadow: var(--shadow);
  }
  .compat-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .compat-row { display: flex; align-items: center; gap: 10px; }
  .compat-score { font-size: 24px; font-weight: 900; }
  .compat-text { font-size: 13px; }
  .compat-bar { height: 10px; border-radius: 5px; background: var(--card2); margin-top: 8px; overflow: hidden; }
  /* ─── Shop links ─── */
  .shop-links { display: flex; flex-wrap: wrap; gap: 10px; margin: 12px 0; }
  .shop-btn {
    padding: 10px 18px; border-radius: 14px;
    font-size: 14px; font-weight: 700;
    text-decoration: none; display: inline-flex; align-items: center;
    transition: all 0.2s; min-height: 44px; color: #fff;
  }
  .shop-btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
  /* ─── Action buttons ─── */
  .action-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; align-items: center; }
  .action-link {
    font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 5px;
    padding: 8px 14px; border-radius: 12px; background: var(--card2);
    font-weight: 600; transition: all 0.2s; min-height: 40px;
  }
  .action-link:hover { background: var(--accent); color: #fff; }
  .compare-btn {
    font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 5px;
    padding: 8px 14px; border-radius: 12px; background: var(--card2);
    font-weight: 600; transition: all 0.2s; min-height: 40px;
  }
  .compare-btn:hover { background: var(--accent2); color: #fff; }
  /* ─── Compare bar ─── */
  .compare-bar {
    background: var(--accent2); border-radius: 16px; padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    margin: 0 20px 8px; flex-wrap: wrap;
  }
  .compare-bar-text { font-size: 14px; font-weight: 700; color: #fff; flex: 1; }
  .compare-go-btn {
    background: var(--green); color: #fff; font-size: 14px; font-weight: 700;
    border: none; border-radius: 12px; padding: 10px 18px; cursor: pointer;
    font-family: inherit; min-height: 44px;
  }
  /* ─── Desktop card ─── */
  .desktop-card {
    background: var(--card); box-shadow: var(--shadow);
    border-radius: 20px; padding: 20px; margin-bottom: 16px;
  }
  .desktop-parts { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
  .desktop-part {
    background: var(--card2); border-radius: 12px; padding: 10px 14px;
    min-width: 160px;
  }
  .part-label { font-size: 12px; color: var(--text3); font-weight: 500; }
  .part-val { font-size: 14px; color: var(--text); font-weight: 600; }
  /* ─── Tab bar ─── */
  .tab-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 14px 20px 8px;
  }
  .tab-btn {
    padding: 10px 20px; border-radius: 14px;
    background: var(--card2); border: none; cursor: pointer;
    font-size: 14px; color: var(--text2); font-family: inherit;
    font-weight: 600; transition: all 0.18s; min-height: 44px;
  }
  .tab-btn.active { background: var(--accent); color: #fff; font-weight: 700; }
  /* ─── Results section ─── */
  .results-list { padding: 0 20px; display: none; }
  .results-list.active { display: block; }
  /* ─── Answer chips ─── */
  .ans-row {
    background: var(--surface);
    box-shadow: 0 1px 4px rgba(62,39,35,0.05);
    padding: 12px 20px;
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    font-size: 14px; color: var(--text3);
  }
  .ans-chip {
    background: var(--card2);
    border-radius: 20px; padding: 6px 14px;
    font-size: 13px; color: var(--accent); cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    font-weight: 600; transition: all 0.15s;
  }
  .ans-chip:hover { background: var(--accent); color: #fff; }
  /* ─── Modal ─── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(62,39,35,0.5); backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card); border-radius: 24px;
    padding: 28px; max-width: 480px; width: 92%;
    max-height: 85vh; overflow-y: auto;
    box-shadow: 0 8px 40px rgba(62,39,35,0.2);
  }
  .modal-title { font-size: 18px; font-weight: 900; color: var(--text); margin-bottom: 16px; }
  .modal-body { font-size: 15px; color: var(--text2); line-height: 1.7; }
  .modal-actions { margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px; }
  .modal-btn {
    padding: 10px 24px; border-radius: 14px; border: none;
    cursor: pointer; font-family: inherit; font-size: 15px; font-weight: 700;
    min-height: 44px; transition: all 0.2s;
  }
  .modal-btn.primary { background: var(--accent); color: #fff; }
  .modal-btn.success { background: var(--green); color: #fff; }
  .modal-btn.danger { background: none; color: var(--red); }
  /* ─── Purchase guide (new) ─── */
  .guide-section {
    background: var(--card); box-shadow: var(--shadow);
    border-radius: 20px; padding: 20px; margin: 16px 20px;
  }
  .guide-title { font-size: 18px; font-weight: 900; color: var(--accent); margin-bottom: 12px; }
  .guide-subtitle { font-size: 15px; font-weight: 700; color: var(--text); margin: 14px 0 8px; }
  .guide-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 0; font-size: 14px; color: var(--text2);
  }
  .guide-item-icon { font-size: 20px; flex-shrink: 0; }
  .guide-item-text { flex: 1; }
  .guide-item-text b { color: var(--text); }
  /* ─── Trap dialog ─── */
  .trap-q { background: var(--card2); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
  .trap-q-num { font-size: 14px; color: var(--accent); font-weight: 700; margin-bottom: 4px; }
  .trap-q-text { font-size: 14px; color: var(--text2); line-height: 1.6; }
  .trap-answer { font-size: 13px; color: var(--green); font-weight: 600; margin-top: 4px; }
  /* ─── Quick pick modal ─── */
  .quick-input {
    width: 100%; padding: 14px 18px; border-radius: 14px;
    border: 2px solid var(--border); background: var(--surface);
    font-size: 16px; font-family: inherit; color: var(--text);
    outline: none; transition: border-color 0.2s;
  }
  .quick-input:focus { border-color: var(--accent); }
  .quick-slider {
    width: 100%; height: 8px; border-radius: 4px;
    -webkit-appearance: none; appearance: none;
    background: var(--card2); outline: none;
    margin: 10px 0;
  }
  .quick-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
    box-shadow: 0 2px 6px rgba(255,140,66,0.4);
  }

  .compare-val { flex: 1; font-size: 14px; text-align: center; }

    background: var(--surface); border-radius: 14px;
    padding: 14px; margin: 8px 0; box-shadow: var(--shadow);

  .pref-box-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 6px; }

    /* ─ Content sections ─ */

// ─── PLAIN SPEC TRANSLATION (NEW) ─────────────────────────
function specToPlain(p) {
  const lines = [];
  // CPU
  const cpu = (p.cpu||"").toLowerCase();
  if (/ultra 7|ultra 9|m4|a19 pro|ryzen 9|i9|snapdragon 8 elite/.test(cpu))
    lines.push({icon:"⚡", text:"超強處理器 — 做什麼都不會卡，非常快"});
  else if (/ultra 5|m3|m2|a19|a18|a17|ryzen 7|i7|snapdragon 8 gen/.test(cpu))
    lines.push({icon:"⚡", text:"很快的處理器 — 同時開很多程式也不會卡"});
  else if (/ryzen 5|i5|snapdragon 7/.test(cpu))
    lines.push({icon:"⚡", text:"夠用的處理器 — 日常使用很流暢"});
  else if (/i3|n200|helio|snapdragon 6|exynos/.test(cpu))
    lines.push({icon:"⚡", text:"基本處理器 — 上網、LINE、追劇沒問題"});
  else
    lines.push({icon:"⚡", text:"處理器 — 負責電腦運算的大腦"});

  // RAM
  const ramNum = parseInt((p.ram||"").replace(/[^0-9]/g,"")) || 0;
  if (ramNum >= 32)
    lines.push({icon:"🧠", text:"超大記憶體 — 同時開幾十個東西都不會慢"});
  else if (ramNum >= 16)
    lines.push({icon:"🧠", text:"大記憶體 — 多工作業很流暢"});
  else if (ramNum >= 8)
    lines.push({icon:"🧠", text:"夠用的記憶體 — 一般使用沒問題"});
  else if (ramNum >= 4)
    lines.push({icon:"🧠", text:"基本記憶體 — 適合簡單使用"});

  // SSD
  const ssdText = (p.ssd||"").toLowerCase();
  const ssdNum = parseInt(ssdText.replace(/[^0-9]/g,"")) || 0;
  if (/tb/.test(ssdText) || ssdNum >= 1000)
    lines.push({icon:"📦", text:"超大儲存空間 — 可以存約 20 萬張照片"});
  else if (ssdNum >= 512)
    lines.push({icon:"📦", text:"大儲存空間 — 可以存約 10 萬張照片"});
  else if (ssdNum >= 256)
    lines.push({icon:"📦", text:"夠用的儲存 — 可以存約 5 萬張照片"});
  else if (ssdNum >= 128)
    lines.push({icon:"📦", text:"基本儲存 — 裝常用 App 和一些照片"});

  // Battery
  const bat = (p.battery||"").toLowerCase();
  if (/18|兩天|二天/.test(bat))
    lines.push({icon:"🔋", text:"電池超耐用 — 充一次可以用快兩天"});
  else if (/1[4-7]|一天半/.test(bat))
    lines.push({icon:"🔋", text:"電池很耐用 — 出門一整天不用帶充電器"});
  else if (/1[0-3]|一天/.test(bat))
    lines.push({icon:"🔋", text:"電池夠用 — 正常使用撐一天沒問題"});

  // Weight
  const wt = parseFloat((p.weight||"").replace(/[^0-9.]/g,"")) || 0;
  if (wt > 0 && wt < 200) { // grams for phone
    if (wt <= 170) lines.push({icon:"⚖️", text:"很輕巧 — 放口袋不會覺得重"});
    else if (wt <= 200) lines.push({icon:"⚖️", text:"正常重量 — 跟一般手機差不多"});
    else lines.push({icon:"⚖️", text:"稍微重一點 — 功能比較強大"});
  } else if (wt > 0) { // kg for laptop
    if (wt <= 1.3) lines.push({icon:"⚖️", text:"超輕！跟一瓶礦泉水差不多重"});
    else if (wt <= 1.6) lines.push({icon:"⚖️", text:"還算輕 — 背包裡不太有感覺"});
    else lines.push({icon:"⚖️", text:"有點重量 — 但螢幕比較大"});
  }

  return lines;
}

function quickPickMatch(text, budget) {
  text = text.toLowerCase();
  // Detect device type
  let device = "phone";
  if (/筆電|電腦|laptop|notebook/.test(text)) device = "computer";
  else if (/平板|ipad|tab/.test(text)) device = "tablet";
  else if (/桌機|桌電|desktop/.test(text)) device = "desktop";

  let matchedUser = "general", matchedBudget = "mid";

  // Determine budget from slider value
  if (budget <= 15000) matchedBudget = "budget";
  else if (budget <= 30000) matchedBudget = "mid";
  else if (budget <= 50000) matchedBudget = "high";
  else matchedBudget = "pro";

  // Match keywords
  const kwMap = QUICK_KEYWORDS[device] || QUICK_KEYWORDS.phone;
  for (const [pattern, result] of Object.entries(kwMap)) {
    if (new RegExp(pattern).test(text)) {
      matchedUser = result.user;
      break;
    }
  }

  return {device, user: matchedUser, budget: matchedBudget};
}

function getSetupGuideKey(p) {
  const brand = (p.brand||"").toLowerCase();
  const name = (p.name||"").toLowerCase();
  if (brand === "apple") {
    if (/iphone|ipad/.test(name)) return "iphone";
    if (/macbook|mac/.test(name)) return "mac";

  return "android";
}

const _PH_KEY = "3c_price_history";
function loadPriceHistory() { try { return JSON.parse(localStorage.getItem(_PH_KEY) || "{}"); } catch { return {}; } }
function savePriceHistory(ph) { try { localStorage.setItem(_PH_KEY, JSON.stringify(ph)); } catch {} }
function recordPrices(products) {
  const ph = loadPriceHistory();
  const dateStr = new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit"});
  products.forEach(p => {
    if (!p.name || !p.price) return;
    const pNum = priceNum(p.price);
    if (!pNum) return;
    if (!ph[p.name]) ph[p.name] = [];
    const hist = ph[p.name];
    const last = hist[hist.length-1];
    if (!last || last.p !== pNum) { hist.push({d: dateStr, p: pNum}); if (hist.length > 26) hist.shift(); }
  });
  savePriceHistory(ph);
}
function _strHash(str) { let h=5381; for(let i=0;i<str.length;i++) h=((h<<5)+h)^str.charCodeAt(i); return Math.abs(h>>>0); }
function seedPriceHistory() {
  const ph = loadPriceHistory();
  const allProds = [...PRODUCTS.laptop, ...PRODUCTS.phone, ...PRODUCTS.tablet];
  const now = new Date(); const POINTS = 26;
  allProds.forEach(p => {
    if (!p.name || !p.price) return;
    const pNum = priceNum(p.price); if (!pNum) return;
    const existing = ph[p.name] || [];
    if (existing.filter(x => !x.s).length >= 6) return;
    const hash = _strHash(p.name);
    const isNew = /2026|A19|M4|Elite|Ultra 7/.test(p.name + (p.cpu||""));
    const maxPremium = isNew ? 0.08 + (hash % 8) * 0.01 : 0.03 + (hash % 5) * 0.01;
    const hist = [];
    for (let i = 0; i < POINTS; i++) {
      const d = new Date(now); d.setDate(d.getDate() - (POINTS - 1 - i) * 14);
      const dateStr = d.toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit"});
      const t = i / (POINTS - 1);
      const launchPremium = maxPremium * (1 - t);
      const noise = ((hash * (i + 13)) % 1000) / 1000 * 0.04 - 0.02;
      const saleDip = ((hash * i) % 7 === 0) ? -0.035 : 0;
      const mult = Math.max(0.85, 1 + launchPremium + noise + saleDip);
      hist.push({d: dateStr, p: Math.round(pNum * mult / 100) * 100, s: true});
    }
    const todayStr = now.toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit"});
    hist[hist.length - 1] = {d: todayStr, p: pNum, s: false};
    const realPts = existing.filter(x => !x.s);
    ph[p.name] = [...hist, ...realPts].slice(-26);
  });
  savePriceHistory(ph);
}
function _filterHistory(history, days) {
  if (!days) return history;
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
  const filtered = history.filter(h => { const parts=h.d.split('/'); return new Date(+parts[0],+parts[1]-1,+parts[2]) >= cutoff; });
  return filtered.length >= 2 ? filtered : history.slice(-Math.max(4, Math.round(days/14)));
}
function _buildChart(history, W, H, annots=true) {
  if (!history || history.length < 2) return "";
  const prices=history.map(h=>h.p), dates=history.map(h=>h.d), n=prices.length;
  const PL=annots?44:6, PR=annots?10:6, PT=annots?30:6, PB=annots?20:6;
  const cW=W-PL-PR, cH=H-PT-PB;
  const rawMin=Math.min(...prices), rawMax=Math.max(...prices);
  const pad=(rawMax-rawMin)*0.2||rawMin*0.06;
  const lo=rawMin-pad, hi=rawMax+pad;
  const cx=i=>PL+(i/(n-1))*cW, cy=p=>PT+cH-((p-lo)/(hi-lo))*cH;
  const linePts=prices.map((p,i)=>`${cx(i).toFixed(1)},${cy(p).toFixed(1)}`).join(" ");
  const fillPts=`${PL},${PT+cH} `+linePts+` ${(PL+cW).toFixed(1)},${PT+cH}`;
  const lastP=prices[n-1], firstP=prices[0];
  const color=lastP<=firstP?"#4CAF50":"#E53935";
  const gid="phg"+(_strHash(String(prices[0])+n+W+(annots?1:0))%99999);
  let annotSvg="", xAxisSvg="", yAxisSvg="";
  if (annots) {
    const changes=[];
    for(let i=1;i<n;i++) if(prices[i]!==prices[i-1]) changes.push({i,diff:prices[i]-prices[i-1],price:prices[i],date:dates[i]});
    const topChanges=[...changes].sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff)).slice(0,6).sort((a,b)=>a.i-b.i);
    const yTicks=[rawMin,Math.round((rawMin+rawMax)/2/500)*500,rawMax].filter((v,i,a)=>a.indexOf(v)===i);
    const xTicks=[]; let prevMo="";
    dates.forEach((d,i)=>{const mo=d.slice(0,7);if(mo!==prevMo){xTicks.push({i,label:d.slice(5,7)+"月"});prevMo=mo;}});
    const xStep=Math.ceil(xTicks.length/7);
    yAxisSvg=yTicks.map(p=>`<line x1="${PL}" y1="${cy(p).toFixed(1)}" x2="${W-PR}" y2="${cy(p).toFixed(1)}" stroke="var(--border)" stroke-width="0.5"/>
    <text x="${PL-4}" y="${(cy(p)+3).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--text3)">${p>=10000?(p/1000).toFixed(0)+"k":p.toLocaleString()}</text>`).join("");
    xAxisSvg=xTicks.filter((_,i)=>i%xStep===0).map(({i,label})=>`<text x="${cx(i).toFixed(1)}" y="${H-2}" text-anchor="middle" font-size="9" fill="var(--text3)">${label}</text>`).join("");
    annotSvg=topChanges.map((c,ci)=>{
      const x=cx(c.i),y=cy(c.price);
      const isDown=c.diff<0, ac=isDown?"#4CAF50":"#E53935";
      const sym=isDown?"▼":"▲";
      const amt=Math.abs(c.diff)>=1000?`${sym}${(Math.abs(c.diff)/1000).toFixed(1)}k`:`${sym}${Math.abs(c.diff).toLocaleString()}`;
      const flip=ci%2===1;
      const ay=flip?y+24:y-22, ly1=flip?y+4:y-4, ly2=flip?ay-10:ay+10;
      const dp=c.date.split("/"); const dl=dp.length>=3?`${+dp[1]}/${+dp[2]}`:c.date.slice(5);
      return `<line x1="${x.toFixed(1)}" y1="${PT}" x2="${x.toFixed(1)}" y2="${(PT+cH).toFixed(1)}" stroke="${ac}" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.5"/>
      <circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="${ac}" stroke="var(--surface)" stroke-width="1.5"/>
      <rect x="${(x-20).toFixed(1)}" y="${(ay-12).toFixed(1)}" width="40" height="22" rx="4" fill="var(--card2)" stroke="${ac}" stroke-width="0.8"/>
      <text x="${x.toFixed(1)}" y="${(ay-2).toFixed(1)}" text-anchor="middle" font-size="9" font-weight="700" fill="${ac}">${amt}</text>
      <text x="${x.toFixed(1)}" y="${(ay+8).toFixed(1)}" text-anchor="middle" font-size="7.5" fill="var(--text3)">${dl}</text>`;
    }).join("");
  }
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block;overflow:visible">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
    </linearGradient></defs>
    ${yAxisSvg}
    <polygon points="${fillPts}" fill="url(#${gid})"/>
    <polyline points="${linePts}" fill="none" stroke="${color}" stroke-width="${annots?2:1.5}" stroke-linejoin="round" stroke-linecap="round"/>
    ${annotSvg}${xAxisSvg}
    <circle cx="${cx(n-1).toFixed(1)}" cy="${cy(lastP).toFixed(1)}" r="${annots?4:3}" fill="${color}" stroke="var(--surface)" stroke-width="2"/>
  </svg>`;
}

async function loadProductDB() {
  try {
    const r = await fetch("./products.json");
    if (!r.ok) throw new Error("no products.json");
    const db = await r.json();
    let loaded = 0;
    if (db.laptop?.length) { PRODUCTS.laptop = db.laptop; loaded += db.laptop.length; }
    if (db.phone?.length)  { PRODUCTS.phone  = db.phone;  loaded += db.phone.length; }
    if (db.tablet?.length) { PRODUCTS.tablet = db.tablet;  loaded += db.tablet.length; }
    if (db.desktop?.length) PRODUCTS.desktop = db.desktop;
    // 記錄價格歷史
    const allProds = [...PRODUCTS.laptop, ...PRODUCTS.phone, ...PRODUCTS.tablet];
    recordPrices(allProds);
    seedPriceHistory();
    // 顯示更新時間
    const badge = document.getElementById("updateBadge");
    const btn = document.getElementById("updateBtn");
    const ts = db.meta?.updated_at?.slice(0,10) || "";
    if (badge) { badge.style.display = ""; badge.textContent = ts ? `📅 ${ts}` : ""; }
    if (btn) btn.textContent = loaded > 0 ? `✅ ${loaded} 款產品` : "📦 內建資料";
    renderPage();
  } catch {
    // Fallback: 使用內建寫死的 PRODUCTS
    const badge = document.getElementById("updateBadge");
    const btn = document.getElementById("updateBtn");
    if (btn) btn.textContent = "📦 內建資料";
    if (badge) badge.style.display = "none";
  }
}

function priceNum(priceStr) { const m=(priceStr||"").replace(/,/g,"").match(/\d+/); return m?parseInt(m[0]):0; }
function priceTag(priceStr) {

function getPerfScores(p) {
  const spec=((p.cpu||"")+" "+(p.gpu||"")+" "+(p.ram||"")+" "+(p.ssd||"")).toLowerCase();
  let office=0.75,game=0.30,edit=0.30;
  if(/ultra 7|ultra 9|m4|m3|ryzen 9|i9/.test(spec)){office=1.0;edit=0.90;game=Math.max(game,0.60);}
  else if(/ultra 5|m2|ryzen 7|i7|r7/.test(spec)){office=0.92;edit=0.75;game=Math.max(game,0.50);}
  else if(/ryzen 5|i5|r5|a17|a18|a19|snapdragon 8 elite/.test(spec)){office=0.85;edit=0.55;game=Math.max(game,0.40);}
  else if(/i3|ryzen 3|exynos/.test(spec)){office=0.70;edit=0.35;game=Math.max(game,0.25);}
  if(/rtx 5070 ti|rtx 5080|rtx 5090/.test(spec)){game=1.0;edit=1.0;}
  else if(/rtx 5070|rtx 4090|rtx 4080/.test(spec)){game=0.95;edit=0.95;}
  else if(/rtx 5060|rtx 4070/.test(spec)){game=0.85;edit=0.80;}
  else if(/rtx 4060|rtx 3070/.test(spec)){game=0.75;edit=0.70;}
  else if(/rtx|gtx/.test(spec)){game=0.65;edit=0.60;}
  if(/64gb/.test(spec)){edit=Math.min(edit+0.10,1.0);}
  else if(/32gb/.test(spec)){edit=Math.min(edit+0.05,1.0);}
  return{office:Math.round(office*100)/100,game:Math.round(game*100)/100,edit:Math.round(edit*100)/100};
}
function getFreshness(p) {
  const spec=((p.cpu||"")+" "+(p.gpu||"")).toLowerCase();
  if(/ultra 7|ultra 9|m4|m3|rtx 5|ryzen 9 9|a19|snapdragon 8 elite/.test(spec))
    return{emoji:"🟢",label:"最新款，可以安心用很久",color:"var(--green)",bg:"var(--pros-bg)",borderColor:"#4CAF5066"};
  if(/ultra 5|m2|rtx 4|ryzen 7 9|ryzen 5 7|i7-13|i5-13|a18|a17|snapdragon 8 gen 3/.test(spec))
    return{emoji:"🟡",label:"主流款，用個三年沒問題",color:"#FF8F00",bg:"var(--cons-bg)",borderColor:"#FF8F0066"};
  return{emoji:"🔴",label:"稍舊的款式，價格要夠便宜才值得",color:"var(--red)",bg:"#FFEBEE",borderColor:"#E5393566"};
}
function getCompatScore(p, apps) {
  if(!apps.length) return{score:1.0,color:"var(--green)",text:"沒有特定需求，這台完全夠用！👍"};
  const scores=getPerfScores(p);
  const hasHeavyGame=apps.some(a=>/3A|絕地/.test(a));
  const has4K=apps.some(a=>/4K/.test(a));
  const hasAI=apps.some(a=>/AI|機器學習/.test(a));
  let score=1.0;
  if(hasHeavyGame) score=Math.min(score,scores.game);
  if(has4K) score=Math.min(score,scores.edit);
  if(hasAI) score=Math.min(score,scores.edit*0.9);
  if(score>=0.80) return{score,color:"var(--green)",text:"完全夠用！放心買 ✅"};
  if(score>=0.55) return{score,color:"var(--orange)",text:"大部分沒問題，少數重度使用要注意 ⚠️"};
  return{score,color:"var(--red)",text:"可能會不夠力，建議選更好的 ❌"};
}
function getAppCategories() { return answers.device==="phone"?APP_CATS_PHONE:APP_CATS_COMPUTER; }
function getRequiredBudget() {
  if(!selectedApps.length) return 0;
  const cats=getAppCategories(); let allItems={};
  Object.values(cats).forEach(c=>Object.assign(allItems,c.items));
  return Math.max(...selectedApps.map(a=>allItems[a]?.min_budget||0));
}
function getBudgetWarning() {
  const budgetMap={budget:15000,mid:30000,high:50000,pro:99999};
  const budVal=budgetMap[answers.budget]||0; const req=getRequiredBudget();
  if(!req||req<=budVal) return null;
  const suggested=req<=42000?"NT$35,000":"NT$45,000 以上";
  return `💡 你選的用途需要比較好的規格，建議預算提升到 ${suggested} 會比較順暢喔！`;
}
function filterProducts() {
  const d=answers.device||"computer"; const b=answers.budget||"mid";
  const budgetMap={budget:15000,mid:30000,high:50000,pro:99999};
  const budVal=budgetMap[b];
  const key={computer:"laptop",phone:"phone",tablet:"tablet"}[d]||"laptop";
  let list=[...(PRODUCTS[key]||[])];
  list=list.filter(p=>priceNum(p.price)<=budVal*1.25);
  return list;
}

}
function matchPrefs(p) {
  const bk=(p.brand||"").toLowerCase(); const tags=BRAND_TAGS[bk]||{};
  const matched=[],missed=[];
  if(userPrefs.brand.length){if(userPrefs.brand.includes(tags.brand)) matched.push(`✅ 品牌符合（${tags.brand}）`);else missed.push(`品牌不在偏好內（${tags.brand||"未知"}）`);}
  if(userPrefs.origin.length){if(userPrefs.origin.includes(tags.origin)) matched.push(`✅ 產地符合（${tags.origin}）`);else missed.push(`非偏好產地（${tags.origin||"未知"}）`);}
  return{matched,missed};
}
function getExpertComment(p) {
  const scores=getPerfScores(p); const{office:o,game:g,edit:e}=scores;
  const name=p.name; const brand=(p.brand||"").toLowerCase();
  const lines=[];
  if(selectedApps.length){
    lines.push("📋 針對你的需求：");
    selectedApps.forEach(app=>{
      let verdict="";
      if(/3A|絕地/.test(app)) verdict=g>=0.80?"✅ 沒問題，跑得很順":"❌ 可能會卡，建議選更好的";
      else if(/英雄聯盟|輕量遊戲/.test(app)) verdict=g>=0.55?"✅ 完全沒問題":"⚠️ 可以跑但要降低畫質";
      else if(/4K/.test(app)) verdict=e>=0.80?"✅ 剪 4K 影片很順":"⚠️ 剪一般影片可以，4K 可能會慢";
      else if(/Photoshop|設計/.test(app)) verdict=e>=0.70?"✅ 修圖設計很順":"⚠️ 基本修圖可以";
      else if(/AI|機器學習/.test(app)) verdict=e>=0.85?"✅ AI 運算沒問題":"❌ 需要更強的機器";
      else verdict=o>=0.80?"✅ 完全夠用":"⚠️ 基本操作可以";
      lines.push(`  • ${app}：${verdict}`);
    });
    lines.push("");
  }
  lines.push("💡 特別提醒：");
  if(/apple|macbook/.test(brand+name.toLowerCase())){
    lines.push("  • 蘋果電腦不能玩 Windows 遊戲");
    lines.push("  • 插孔比較少，可能需要買轉接頭");
  } else if(/google/.test(brand)){
    lines.push("  • 台灣沒有官方店面，維修要寄送");
    lines.push("  • 但保證更新 7 年，用很久都安全");
  } else if(/huawei/.test(brand)){
    lines.push("  ⚠️ 重要：華為手機不能用 Google 商店");
    lines.push("  • 無法下載 LINE、Gmail、YouTube 等常用 App");
  }
  return lines.join("\n");
}

function goTo(step) {
  currentStep=step; renderStepper(); renderPage();
  document.getElementById("backBtn").style.display=step>0?"":"none";
  document.getElementById("homeBtn").style.display=step>0?"":"none";
  // 手機上減少按鈕：非首頁時隱藏更新資訊
  const ub=document.getElementById("updateBtn");
  const ubg=document.getElementById("updateBadge");
  if(ub) ub.style.display=step>0?"none":"";
  if(ubg) ubg.style.display=step>0?"none":"";
  window.scrollTo({top:0,behavior:"smooth"});
}
function goBack() { if(currentStep>0) goTo(currentStep-1); }

// ─── STEPPER ────────────────────────────────────────────────
function renderStepper() {
  const el=document.getElementById("stepper"); let html="";
  STEPS.forEach((label,i)=>{
    const done=i<currentStep; const active=i===currentStep;
    const cls=done?"done":active?"active":"";
    const txt=done?"✓":i<6?i+1:"★";
    html+=`<div class="step-item">
      <div class="step-dot ${cls}" onclick="${i<=currentStep?`goTo(${i})`:'void 0'}" style="cursor:${i<=currentStep?'pointer':'default'}">${txt}</div>
      <div class="step-label ${cls}">${label}</div>
    </div>`;
    if(i<STEPS.length-1) html+=`<div class="step-line ${i<currentStep?'done':''}"></div>`;
  });
  el.innerHTML=html;
}

function switchTab(tab) {

  document.getElementById("listDesktop").className="results-list"+(tab==="desktop"?" active":"");

function findProduct(encodedName) {
  const name=decodeURIComponent(encodedName);
  return[...PRODUCTS.laptop,...PRODUCTS.phone,...PRODUCTS.tablet].find(p=>p.name===name);
}
function toggleCompare(encodedName) {
  const p=findProduct(encodedName); if(!p) return;
  const idx=compareList.findIndex(x=>x.name===p.name);
  if(idx>=0) compareList.splice(idx,1);
  else{if(compareList.length>=2) compareList.shift();compareList.push(p);}
  const btn=document.getElementById(`cmpbtn-${encodedName}`);
  if(btn){const inCmp=compareList.some(x=>x.name===p.name);btn.innerHTML=inCmp?"✅ 已加入比較":"⚡ 加入比較";btn.style.color=inCmp?"var(--green)":"var(--accent2)";}
  updateCompareBar();
}
function updateCompareBar() {
  const bar=document.getElementById("compareBar"); if(!bar) return;
  if(compareList.length===2){
    bar.innerHTML=`<div class="compare-bar"><div class="compare-bar-text">⚡ ${compareList[0].name} VS ${compareList[1].name}</div><button class="compare-go-btn" onclick="showCompare()">開始比較 →</button></div>`;
  } else if(compareList.length===1){
    bar.innerHTML=`<div style="background:var(--card2);border-radius:14px;padding:12px 18px;margin:0 20px 8px;font-size:14px;color:var(--accent)">已選 ${compareList[0].name}，再選一台開始比較</div>`;
  } else bar.innerHTML="";
}
function showCompare() {
  if(compareList.length<2) return;
  const[a,b]=compareList;
  const sa=getPerfScores(a),sb=getPerfScores(b);
  const pa=priceNum(a.price),pb=priceNum(b.price);
  function cmpRow(label,aVal,bVal,biggerBetter=true){
    const aWin=biggerBetter?aVal>bVal:aVal<bVal;
    const bWin=biggerBetter?bVal>aVal:bVal<aVal;
    return`<div class="compare-row">
      <div class="compare-val ${aWin?"compare-win":""}" style="color:${aWin?"var(--green)":"var(--text2)"}">${typeof aVal==="number"?Math.round(aVal*100)+"分":aVal}</div>
      <div class="compare-mid">${label}</div>
      <div class="compare-val ${bWin?"compare-win":""}" style="color:${bWin?"var(--green)":"var(--text2)"}">${typeof bVal==="number"?Math.round(bVal*100)+"分":bVal}</div>
    </div>`;
  }
  const body=`<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:12px">
    <div class="compare-col"><div style="font-size:12px;color:var(--accent);font-weight:700">${a.brand}</div><div style="font-size:13px;font-weight:700;color:var(--text)">${a.name}</div><div style="font-size:16px;font-weight:900;color:var(--white)">${a.price}</div></div>
    <div style="font-size:16px;font-weight:900;color:var(--text3);padding-top:16px">VS</div>
    <div class="compare-col"><div style="font-size:12px;color:var(--accent);font-weight:700">${b.brand}</div><div style="font-size:13px;font-weight:700;color:var(--text)">${b.name}</div><div style="font-size:16px;font-weight:900;color:var(--white)">${b.price}</div></div>
  </div>
  ${cmpRow("文書上網",sa.office,sb.office)}
  ${cmpRow("玩遊戲",sa.game,sb.game)}
  ${cmpRow("剪片修圖",sa.edit,sb.edit)}
  ${cmpRow("價格",pa,pb,false)}
  <div class="compare-row"><div class="compare-val">${a.battery||"—"}</div><div class="compare-mid">電池</div><div class="compare-val">${b.battery||"—"}</div></div>
  <div class="compare-row"><div class="compare-val">${a.weight||"—"}</div><div class="compare-mid">重量</div><div class="compare-val">${b.weight||"—"}</div></div>`;
  showModal("⚡ PK 比較",body,[
    {text:"清除比較",cls:"modal-btn danger",onclick:"compareList=[];closeModal();updateCompareBar();"},
    {text:"關閉",cls:"modal-btn primary",onclick:"closeModal()"},
  ]);
}
function doShare(platform) {
  const text="免費 3C 選購小幫手，幫長輩和家人輕鬆挑 3C！";
  if(!APP_URL){navigator.clipboard.writeText(text).catch(()=>{});alert("📋 已複製推薦文字！");return;}

// ─── HANDLERS ───────────────────────────────────────────────
function attachPageHandlers() {
  document.querySelectorAll(".option-grid").forEach(grid=>{
    const key=grid.dataset.key; const next=parseInt(grid.dataset.next);
    grid.querySelectorAll(".option-card").forEach(card=>{
      card.onclick=()=>{answers[key]=card.dataset.val;goTo(next);};
    });
  });
  document.querySelectorAll(".app-chip").forEach(chip=>{
    chip.onclick=()=>{
      const app=chip.dataset.app;
      if(selectedApps.includes(app)){selectedApps=selectedApps.filter(a=>a!==app);chip.classList.remove("checked");}
      else{selectedApps.push(app);chip.classList.add("checked");}
      renderPage();
    };
  });
  document.querySelectorAll(".scenario-card").forEach(card=>{
    card.onclick=()=>{
      const val=card.dataset.scenario;
      if(selectedScenarios.includes(val)){selectedScenarios=selectedScenarios.filter(v=>v!==val);card.classList.remove("selected");}
      else{selectedScenarios.push(val);card.classList.add("selected");}
      renderPage();
    };
  });
  document.querySelectorAll(".pref-chips").forEach(row=>{
    const key=row.dataset.pref;
    row.querySelectorAll(".pref-chip").forEach(chip=>{
      chip.onclick=()=>{
        const label=chip.dataset.label;
        if(userPrefs[key].includes(label)){userPrefs[key]=userPrefs[key].filter(l=>l!==label);chip.classList.remove("active");}
        else{userPrefs[key].push(label);chip.classList.add("active");}
      };
    });
  });
  if(currentStep===6) updateCompareBar();
}
