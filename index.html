<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3C 選購顧問 — 捷啟智慧科技</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0A0F;
    --surface: #12121A;
    --card: #1A1A26;
    --card2: #22223A;
    --border: #2A2A40;
    --accent: #4F8EF7;
    --accent2: #7C5CFC;
    --green: #00E5A0;
    --orange: #FF8C42;
    --red: #FF4D6D;
    --text: #F0F0FF;
    --text2: #8888AA;
    --text3: #555570;
    --white: #FFFFFF;
    --gold: #FFD700;
  }
  .light-mode {
    --bg: #F5F5FA;
    --surface: #FFFFFF;
    --card: #EEEEF8;
    --card2: #E0E0F0;
    --border: #C8C8E0;
    --text: #111122;
    --text2: #555577;
    --text3: #9999BB;
    --white: #111122;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }
  /* ─── Topbar ─── */
  #topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .dot-badge { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; }
  .topbar-title { font-size: 17px; font-weight: 700; color: var(--text); }
  .topbar-sub {
    background: var(--card2); border-radius: 20px;
    padding: 3px 12px; font-size: 11px; color: var(--accent);
  }
  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .nav-btn {
    padding: 6px 12px; border-radius: 8px;
    background: none; border: none; cursor: pointer;
    color: var(--text2); font-size: 13px; font-family: inherit;
    transition: background 0.2s;
  }
  .nav-btn:hover { background: var(--card2); }
  .theme-btn {
    background: var(--card2); border-radius: 20px;
    padding: 5px 12px; font-size: 13px;
    border: none; cursor: pointer; color: var(--text2);
    font-family: inherit;
  }
  /* ─── Stepper ─── */
  #stepper {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: center;
    gap: 0;
    overflow-x: auto;
  }
  .step-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .step-dot {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--white);
    cursor: pointer; transition: all 0.2s;
    background: var(--border);
  }
  .step-dot.done { background: var(--green); }
  .step-dot.active { background: var(--accent); }
  .step-label { font-size: 10px; color: var(--text3); white-space: nowrap; }
  .step-label.active { color: var(--text); }
  .step-label.done { color: var(--text2); }
  .step-line {
    width: 40px; height: 2px; background: var(--border); margin: 0 2px;
    margin-bottom: 16px; transition: background 0.3s;
  }
  .step-line.done { background: var(--accent); }
  /* ─── Hero ─── */
  .hero {
    padding: 40px 24px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    text-align: center;
  }
  .hero-emoji { font-size: 52px; }
  .hero-title { font-size: 26px; font-weight: 900; color: #fff; }
  .hero-sub { font-size: 13px; color: rgba(255,255,255,0.7); }
  /* ─── Grid ─── */
  .option-grid {
    display: flex; flex-wrap: wrap; gap: 14px;
    justify-content: center; padding: 0 24px 24px;
  }
  .option-card {
    width: 175px; min-height: 155px;
    background: var(--card);
    border: 1px solid var(--border); border-radius: 16px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; padding: 16px 12px;
    cursor: pointer; transition: all 0.18s;
    text-align: center;
  }
  .option-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .option-card.selected {
    background: var(--card2);
    border: 2px solid var(--accent);
  }
  .option-emoji { font-size: 38px; }
  .option-main { font-size: 15px; font-weight: 700; color: var(--text); }
  .option-card.selected .option-main { color: var(--accent); }
  .option-sub { font-size: 11px; color: var(--text3); }
  .option-card.selected .option-sub { color: var(--text2); }
  /* ─── App checkbox grid ─── */
  .app-categories { padding: 0 24px 24px; display: flex; flex-direction: column; gap: 16px; }
  .app-cat-title {
    font-size: 13px; font-weight: 700; color: var(--text2);
    padding: 8px 0 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .app-items { display: flex; flex-wrap: wrap; gap: 8px; }
  .app-chip {
    padding: 7px 14px; border-radius: 20px;
    background: var(--card); border: 1px solid var(--border);
    font-size: 12px; color: var(--text2); cursor: pointer;
    transition: all 0.15s; user-select: none;
  }
  .app-chip:hover { border-color: var(--accent2); }
  .app-chip.checked {
    background: var(--accent2); border-color: var(--accent2);
    color: #fff; font-weight: 700;
  }
  /* ─── Budget tips ─── */
  .budget-tips {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; margin: 0 24px 16px;
  }
  .budget-tips-title { font-size: 13px; font-weight: 700; color: var(--text2); margin-bottom: 8px; }
  .budget-tip-row { display: flex; gap: 8px; padding: 3px 0; font-size: 12px; }
  .budget-tip-label { color: var(--accent); font-weight: 600; min-width: 180px; }
  .budget-tip-desc { color: var(--text3); }
  /* ─── Warning box ─── */
  .warn-box {
    background: #2A1800; border-radius: 12px; padding: 12px 14px;
    border: 1px solid var(--green); color: var(--green);
    font-size: 12px; margin: 0 24px 12px;
  }
  .budget-warn {
    background: #2A0A00; border-color: var(--orange); color: var(--orange);
  }
  /* ─── Prefs ─── */
  .pref-section { padding: 0 24px 20px; }
  .pref-section-title {
    font-size: 14px; font-weight: 700; color: var(--text2);
    padding: 12px 0 8px;
  }
  .pref-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .pref-chip {
    padding: 7px 14px; border-radius: 20px;
    background: var(--card); border: 1px solid var(--border);
    font-size: 12px; color: var(--text2); cursor: pointer;
    transition: all 0.15s;
  }
  .pref-chip:hover { border-color: var(--accent); }
  .pref-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
  /* ─── Buttons ─── */
  .btn-primary {
    background: var(--accent); color: #fff;
    border: none; border-radius: 12px;
    padding: 13px 32px; font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: all 0.18s;
  }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-center { display: flex; justify-content: center; padding: 16px 24px; }
  /* ─── Product card ─── */
  .product-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px; margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  .product-card.top-pick { border-color: var(--gold); }
  .product-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
  .product-brand { font-size: 11px; font-weight: 700; color: var(--accent); }
  .product-name { font-size: 18px; font-weight: 700; color: var(--text); margin: 4px 0; }
  .product-spec { font-size: 11px; color: var(--text3); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
  .product-right { text-align: right; }
  .price-label {
    display: inline-block; padding: 3px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 700; color: #fff; margin-bottom: 4px;
  }
  .price-val { font-size: 22px; font-weight: 900; color: var(--white); }
  .battery-weight { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .badges { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
  .badge {
    padding: 3px 10px; border-radius: 8px;
    font-size: 11px; font-weight: 700;
    background: var(--accent2); color: #fff;
  }
  .badge.secondary { background: var(--card2); color: var(--text2); }
  .badge.tag { background: #2A2010; color: var(--gold); }
  .badge.editor { background: #2A2010; color: var(--gold); }
  /* ─── Pros/cons ─── */
  .pros-cons { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; }
  .pros-box, .cons-box {
    flex: 1; min-width: 160px;
    border-radius: 10px; padding: 10px; font-size: 12px;
  }
  .pros-box { background: #0F1F18; }
  .cons-box { background: #1F160A; }
  .pros-title { color: var(--green); font-weight: 700; font-size: 12px; margin-bottom: 4px; }
  .cons-title { color: var(--orange); font-weight: 700; font-size: 12px; margin-bottom: 4px; }
  .pros-text { color: var(--text2); }
  .cons-text { color: var(--text2); }
  /* ─── Score bars ─── */
  .score-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; margin: 10px 0;
  }
  .score-section-title { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
  .score-row { margin-bottom: 8px; }
  .score-header { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
  .score-label { color: var(--text2); }
  .score-val { font-weight: 700; }
  .score-bar { height: 5px; border-radius: 3px; background: var(--surface); overflow: hidden; }
  .score-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  /* ─── Freshness ─── */
  .freshness-bar {
    display: flex; align-items: center; gap: 8px;
    border-radius: 10px; padding: 10px 14px;
    font-size: 12px; font-weight: 700; margin: 8px 0;
    border: 1px solid;
  }
  /* ─── Compat ─── */
  .compat-box {
    background: var(--surface); border-radius: 12px;
    padding: 14px; margin: 10px 0; border: 2px solid;
  }
  .compat-title { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .compat-row { display: flex; align-items: center; gap: 10px; }
  .compat-score { font-size: 22px; font-weight: 900; }
  .compat-text { font-size: 11px; }
  .compat-bar { height: 8px; border-radius: 4px; background: var(--surface); margin-top: 8px; overflow: hidden; }
  /* ─── Shop links ─── */
  .shop-links { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
  .shop-btn {
    padding: 7px 14px; border-radius: 12px;
    font-size: 11px; font-weight: 700;
    text-decoration: none; display: inline-block;
    transition: filter 0.2s;
  }
  .shop-btn:hover { filter: brightness(1.15); }
  /* ─── Action buttons ─── */
  .action-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; align-items: center; }
  .action-link { font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
  .compare-btn { font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
  /* ─── Compare bar ─── */
  .compare-bar {
    background: var(--accent2); border-radius: 10px; padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    margin: 0 24px 8px; flex-wrap: wrap;
  }
  .compare-bar-text { font-size: 12px; font-weight: 700; color: #fff; flex: 1; }
  .compare-go-btn {
    background: var(--green); color: #000; font-size: 12px; font-weight: 700;
    border: none; border-radius: 8px; padding: 6px 14px; cursor: pointer; font-family: inherit;
  }
  /* ─── Desktop card ─── */
  .desktop-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px; margin-bottom: 14px;
  }
  .desktop-parts { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .desktop-part {
    background: var(--surface); border-radius: 8px; padding: 8px 12px;
    min-width: 160px;
  }
  .part-label { font-size: 11px; color: var(--text3); }
  .part-val { font-size: 12px; color: var(--text); font-weight: 500; }
  /* ─── Tab bar ─── */
  .tab-bar {
    display: flex; align-items: center; gap: 4px;
    padding: 12px 24px 8px;
  }
  .tab-btn {
    padding: 9px 18px; border-radius: 8px;
    background: transparent; border: none; cursor: pointer;
    font-size: 13px; color: var(--text2); font-family: inherit;
    transition: all 0.18s;
  }
  .tab-btn.active { background: var(--accent); color: #fff; font-weight: 700; }
  /* ─── Results section ─── */
  .results-list { padding: 0 24px; display: none; }
  .results-list.active { display: block; }
  /* ─── Answer chips ─── */
  .ans-row {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text3);
  }
  .ans-chip {
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 12px;
    font-size: 11px; color: var(--accent); cursor: pointer;
    display: flex; align-items: center; gap: 3px;
  }
  .ans-chip:hover { border-color: var(--accent); }
  /* ─── Modal ─── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card); border-radius: 18px;
    padding: 24px; max-width: 460px; width: 90%;
    max-height: 85vh; overflow-y: auto;
  }
  .modal-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 16px; }
  .modal-body { font-size: 13px; color: var(--text2); line-height: 1.7; }
  .modal-actions { margin-top: 18px; display: flex; justify-content: flex-end; gap: 10px; }
  .modal-btn {
    padding: 8px 20px; border-radius: 10px; border: none;
    cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 700;
  }
  .modal-btn.primary { background: var(--accent); color: #fff; }
  .modal-btn.success { background: var(--green); color: #000; }
  .modal-btn.danger { background: none; color: var(--red); }
  /* ─── Disclaimer modal content ─── */
  .disclaimer-section {
    background: var(--card2); border-radius: 10px; padding: 12px; margin-bottom: 10px;
  }
  .disclaimer-section-title { font-size: 12px; font-weight: 700; margin-bottom: 6px; }
  .disclaimer-section-text { font-size: 12px; color: var(--text2); line-height: 1.6; }
  /* ─── Share section ─── */
  .share-section {
    border-top: 1px solid var(--border);
    padding: 14px 24px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .share-title { font-size: 12px; color: var(--text2); }
  .share-buttons { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
  .share-btn {
    padding: 9px 20px; border-radius: 10px; border: none;
    font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
    position: relative; overflow: hidden; transition: filter 0.2s;
  }
  .share-btn:hover { filter: brightness(1.1); }
  .share-note { font-size: 9px; color: var(--text3); }
  /* ─── Footer ─── */
  footer {
    border-top: 1px solid var(--border);
    padding: 18px 24px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
  }
  .footer-brand { font-size: 13px; font-weight: 700; color: var(--text); }
  .footer-sub { font-size: 11px; color: var(--text3); }
  .footer-link {
    background: var(--card2); border-radius: 8px; padding: 6px 12px;
    font-size: 11px; color: var(--accent); font-weight: 700;
    text-decoration: none;
  }
  .footer-copy { width: 100%; font-size: 10px; color: var(--text3); text-align: center; }
  /* ─── Compare dialog ─── */
  .compare-col { flex: 1; text-align: center; }
  .compare-row { display: flex; align-items: center; gap: 4px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .compare-mid { font-size: 11px; color: var(--text3); min-width: 80px; text-align: center; }
  .compare-val { flex: 1; font-size: 12px; text-align: center; }
  .compare-win { font-weight: 700; }
  /* ─── Pref box ─── */
  .pref-box {
    background: var(--surface); border-radius: 10px;
    padding: 12px; margin: 8px 0;
  }
  .pref-box-title { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .pref-match { font-size: 11px; color: var(--green); }
  .pref-miss { font-size: 11px; color: var(--text3); }
  /* ─── Expert dialog ─── */
  .expert-product-name {
    background: var(--card2); border-radius: 8px; padding: 6px 12px;
    font-size: 14px; color: var(--accent); font-weight: 700; margin-bottom: 8px;
    display: inline-block;
  }
  /* ─── Price history ─── */
  .price-history {
    display: block;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 12px; margin: 10px 0;
    font-size: 11px;
  }
  .price-history-label { color: var(--text3); white-space: nowrap; }
  .price-trend-up   { color: var(--red); font-weight: 700; }
  .price-trend-down { color: var(--green); font-weight: 700; }
  .price-trend-flat { color: var(--text3); }
  .sparkline-wrap { width: 100%; }
  .price-history-meta { text-align: right; white-space: nowrap; color: var(--text3); }
  .ph-range-btn { transition: background 0.15s, color 0.15s; }
  .ph-range-btn:hover { background: var(--card2) !important; }
  /* ─── Trap dialog ─── */
  .trap-q { background: var(--card2); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
  .trap-q-num { font-size: 13px; color: var(--accent); font-weight: 700; margin-bottom: 4px; }
  .trap-q-text { font-size: 12px; color: var(--text2); }
  /* ─── Watermark ─── */
  .watermark {
    position: fixed; right: 12px; bottom: 12px;
    font-size: 11px; color: var(--text); opacity: 0.18;
    pointer-events: none; z-index: 50;
  }
  /* ─── Responsive ─── */
  @media (max-width: 600px) {
    #topbar { padding: 10px 12px; }
    .topbar-sub { display: none; }
    .hero { padding: 24px 12px; }
    .hero-emoji { font-size: 36px; }
    .hero-title { font-size: 20px; }
    .option-grid { padding: 0 12px 16px; gap: 10px; }
    .option-card { width: calc(50% - 5px); min-height: 115px; }
    .option-emoji { font-size: 26px; }
    .option-main { font-size: 13px; }
    .app-categories, .pref-section, .btn-center, .tab-bar { padding-left: 12px; padding-right: 12px; }
    .results-list { padding: 0 12px; }
    .ans-row { padding: 8px 12px; }
    .budget-tips { margin: 0 12px 12px; }
    .warn-box { margin: 0 12px 10px; }
    .compare-bar { margin: 0 12px 8px; }
    .share-section { padding: 12px; }
    footer { padding: 14px 12px; }
    .tab-btn { padding: 8px 12px; font-size: 12px; }
    .product-name { font-size: 15px; }
    .price-val { font-size: 18px; }
    .step-line { width: 24px; }
    .budget-tip-row { flex-direction: column; gap: 2px; }
  }
  /* ─── Animations ─── */
  .page-enter { animation: fadeSlideUp 0.3s ease forwards; }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- Topbar -->
<div id="topbar">
  <div class="topbar-left">
    <div class="dot-badge"></div>
    <span class="topbar-title">3C 選購顧問</span>
    <span class="topbar-sub">2026 最新 · 免費 · 防騙</span>
  </div>
  <div class="topbar-right">
    <span id="updateBadge" style="display:none;font-size:10px;color:var(--green);background:var(--card2);padding:3px 8px;border-radius:12px;cursor:default"></span>
    <button class="nav-btn" id="updateBtn" onclick="showUpdateModal()" style="color:var(--green);border:1px solid #00E5A033;font-size:12px">🔄 更新資料</button>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙 深色</button>
    <button class="nav-btn" id="backBtn" onclick="goBack()" style="display:none">← 上一步</button>
    <button class="nav-btn" id="homeBtn" onclick="goTo(0)" style="display:none">🏠 回首頁</button>
  </div>
</div>

<!-- Stepper -->
<div id="stepper"></div>

<!-- Main content -->
<div id="mainContent"></div>

<!-- Watermark -->

const _PCHOME = "https://ecshweb.pchome.com.tw/search/v3.3/";
const _PCHOME_QUERIES = {
  laptop: ["ASUS 筆電","Apple MacBook","Lenovo 筆電","Dell 筆電","Acer 筆電","Samsung 筆電"],
  phone:  ["iPhone","Samsung Galaxy S","Google Pixel","ASUS 手機","小米手機"],
  tablet: ["iPad","Samsung Galaxy Tab","Microsoft Surface","小米平板"],
};
const _LS_KEY = "3c_products_db";

// ─── PRICE HISTORY ──────────────────────────────────────────
const _PH_KEY = "3c_price_history";

function loadPriceHistory() {
  try { return JSON.parse(localStorage.getItem(_PH_KEY) || "{}"); } catch { return {}; }
}
function savePriceHistory(ph) {
  try { localStorage.setItem(_PH_KEY, JSON.stringify(ph)); } catch {}
}
function recordPrices(products) {
  const ph = loadPriceHistory();
  const dateStr = new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit"});
  products.forEach(p => {
    if (!p.name || !p.price) return;
    const pNum = priceNum(p.price);
    if (!pNum) return;
    if (!ph[p.name]) ph[p.name] = [];
    const hist = ph[p.name];
    const last = hist[hist.length-1];
    if (!last || last.p !== pNum) {
      hist.push({d: dateStr, p: pNum});
      if (hist.length > 26) hist.shift();
    }
  });
  savePriceHistory(ph);
}

// 確定性雜湊（讓同產品的估算值每次相同）
function _strHash(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
  return Math.abs(h >>> 0);
}

// 補種過去1年估算歷史（僅在沒有足夠真實資料時執行）
function seedPriceHistory() {
  const ph = loadPriceHistory();
  const allProds = [...PRODUCTS.laptop, ...PRODUCTS.phone, ...PRODUCTS.tablet];
  const now = new Date();
  const POINTS = 26; // 26 × 2週 ≈ 1年

  allProds.forEach(p => {
    if (!p.name || !p.price) return;
    const pNum = priceNum(p.price);
    if (!pNum) return;
    // 若已有 ≥6 筆真實追蹤資料，跳過
    const existing = ph[p.name] || [];
    if (existing.filter(x => !x.s).length >= 6) return;

    const hash = _strHash(p.name);
    // 新品判斷：名字含年份或新晶片
    const isNew = /2026|A19|M4|Elite|Ultra 7/.test(p.name + (p.cpu||""));
    const maxPremium = isNew ? 0.08 + (hash % 8) * 0.01 : 0.03 + (hash % 5) * 0.01;

    const hist = [];
    for (let i = 0; i < POINTS; i++) {
      const d = new Date(now);
      d.setDate(d.getDate() - (POINTS - 1 - i) * 14);
      const dateStr = d.toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit"});
      const t = i / (POINTS - 1);                       // 0=最舊, 1=最新
      const launchPremium = maxPremium * (1 - t);       // 越舊越貴（上市定價高）
      const noise = ((hash * (i + 13)) % 1000) / 1000 * 0.04 - 0.02; // ±2% 隨機雜訊
      const saleDip = ((hash * i) % 7 === 0) ? -0.035 : 0;           // 偶發促銷
      const mult = Math.max(0.85, 1 + launchPremium + noise + saleDip);
      hist.push({d: dateStr, p: Math.round(pNum * mult / 100) * 100, s: true}); // s=估算
    }
    // 最後一筆 = 當前真實價格
    const todayStr = now.toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit"});
    hist[hist.length - 1] = {d: todayStr, p: pNum, s: false};

    // 保留既有的真實記錄，估算值放前面
    const realPts = existing.filter(x => !x.s);
    ph[p.name] = [...hist, ...realPts].slice(-26);
  });
  savePriceHistory(ph);
}

// 過濾最近 N 天的歷史
function _filterHistory(history, days) {
  if (!days) return history;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  const filtered = history.filter(h => {
    const parts = h.d.split('/');
    return new Date(+parts[0], +parts[1]-1, +parts[2]) >= cutoff;
  });
  return filtered.length >= 2 ? filtered : history.slice(-Math.max(4, Math.round(days/14)));
}

// BigGo 風格價格走勢圖（annots=false 為卡片簡潔版）
function _buildChart(history, W, H, annots=true) {
  if (!history || history.length < 2) return "";
  const prices = history.map(h => h.p);
  const dates  = history.map(h => h.d);
  const n = prices.length;
  // 卡片簡潔版用更小的 padding，不需預留標注空間
  const PL = annots?44:6, PR = annots?10:6, PT = annots?30:6, PB = annots?20:6;
  const cW = W - PL - PR, cH = H - PT - PB;
  const rawMin = Math.min(...prices), rawMax = Math.max(...prices);
  const pad = (rawMax - rawMin) * 0.2 || rawMin * 0.06;
  const lo = rawMin - pad, hi = rawMax + pad;
  const cx = i => PL + (i/(n-1))*cW;
  const cy = p => PT + cH - ((p-lo)/(hi-lo))*cH;
  const linePts = prices.map((p,i)=>`${cx(i).toFixed(1)},${cy(p).toFixed(1)}`).join(" ");
  const fillPts = `${PL},${PT+cH} `+linePts+` ${(PL+cW).toFixed(1)},${PT+cH}`;
  const lastP = prices[n-1], firstP = prices[0];
  const color = lastP <= firstP ? "#00E5A0" : "#FF4D6D";
  const gid = "phg"+(_strHash(String(prices[0])+n+W+(annots?1:0))%99999);
  // 價格變動標注（僅放大版）
  let annotSvg = "";
  let xAxisSvg = "";
  let yAxisSvg = "";
  if (annots) {
    const changes = [];
    for (let i=1;i<n;i++) if(prices[i]!==prices[i-1]) changes.push({i,diff:prices[i]-prices[i-1],price:prices[i],date:dates[i]});
    const topChanges = [...changes].sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff)).slice(0,6).sort((a,b)=>a.i-b.i);
    const yTicks=[rawMin,Math.round((rawMin+rawMax)/2/500)*500,rawMax].filter((v,i,a)=>a.indexOf(v)===i);
    const xTicks=[]; let prevMo="";
    dates.forEach((d,i)=>{const mo=d.slice(0,7);if(mo!==prevMo){xTicks.push({i,label:d.slice(5,7)+"月"});prevMo=mo;}});
    const xStep=Math.ceil(xTicks.length/7);
    yAxisSvg = yTicks.map(p=>`<line x1="${PL}" y1="${cy(p).toFixed(1)}" x2="${W-PR}" y2="${cy(p).toFixed(1)}" stroke="var(--border)" stroke-width="0.5"/>
    <text x="${PL-4}" y="${(cy(p)+3).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--text3)">${p>=10000?(p/1000).toFixed(0)+"k":p.toLocaleString()}</text>`).join("");
    xAxisSvg = xTicks.filter((_,i)=>i%xStep===0).map(({i,label})=>`<text x="${cx(i).toFixed(1)}" y="${H-2}" text-anchor="middle" font-size="9" fill="var(--text3)">${label}</text>`).join("");
    annotSvg = topChanges.map((c,ci)=>{
      const x=cx(c.i), y=cy(c.price);
      const isDown=c.diff<0, ac=isDown?"#00E5A0":"#FF4D6D";
      const sym=isDown?"▼":"▲";
      const amt=Math.abs(c.diff)>=1000?`${sym}${(Math.abs(c.diff)/1000).toFixed(1)}k`:`${sym}${Math.abs(c.diff).toLocaleString()}`;
      const flip=ci%2===1;
      const ay=flip?y+24:y-22, ly1=flip?y+4:y-4, ly2=flip?ay-10:ay+10;
      const dp=c.date.split("/"); const dl=dp.length>=3?`${+dp[1]}/${+dp[2]}`:c.date.slice(5);
      return `<line x1="${x.toFixed(1)}" y1="${PT}" x2="${x.toFixed(1)}" y2="${(PT+cH).toFixed(1)}" stroke="${ac}" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.5"/>
      <line x1="${x.toFixed(1)}" y1="${ly1.toFixed(1)}" x2="${x.toFixed(1)}" y2="${ly2.toFixed(1)}" stroke="${ac}" stroke-width="1" opacity="0.7"/>
      <rect x="${(x-20).toFixed(1)}" y="${(ay-12).toFixed(1)}" width="40" height="22" rx="4" fill="var(--card2)" stroke="${ac}" stroke-width="0.8"/>
      <text x="${x.toFixed(1)}" y="${(ay-2).toFixed(1)}" text-anchor="middle" font-size="9" font-weight="700" fill="${ac}">${amt}</text>
      <text x="${x.toFixed(1)}" y="${(ay+8).toFixed(1)}" text-anchor="middle" font-size="7.5" fill="var(--text3)">${dl}</text>
      <circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="${ac}" stroke="var(--surface)" stroke-width="1.5"/>`;
    }).join("");
  }
  const heightAttr = annots ? "" : ` height="${H}"`;
  return `<svg width="100%"${heightAttr} viewBox="0 0 ${W} ${H}" style="display:block;overflow:visible">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
    </linearGradient></defs>
    ${yAxisSvg}
    <polygon points="${fillPts}" fill="url(#${gid})"/>
    <polyline points="${linePts}" fill="none" stroke="${color}" stroke-width="${annots?2:1.5}" stroke-linejoin="round" stroke-linecap="round"/>
    ${annotSvg}
    ${xAxisSvg}
    <circle cx="${cx(n-1).toFixed(1)}" cy="${cy(lastP).toFixed(1)}" r="${annots?4:3}" fill="${color}" stroke="var(--surface)" stroke-width="2"/>
  </svg>`;
}

async function _fetchPChome(query, rows=6) {
  try {
    const params = new URLSearchParams({q:query, scope:"TW", sort:"rnk", isinstock:"T", rows});
    const r = await fetch(`${_PCHOME}?${params}`);
    if (!r.ok) return [];
    const data = await r.json();
    return data.prods || [];
  } catch { return []; }
}

function _parsePChomeProd(raw) {
  const name  = (raw.Nick || "").trim();
  const price = raw.Price?.m || 0;
  if (!name || !price) return null;
  const brandMap = {
    "ASUS":"ASUS","Apple":"Apple","Samsung":"Samsung","Lenovo":"Lenovo",
    "Acer":"Acer","HP":"HP","Dell":"Dell","Sony":"Sony",
    "Google":"Google","Xiaomi":"Xiaomi","MI":"Xiaomi","OPPO":"OPPO",
    "vivo":"vivo","Huawei":"Huawei","Microsoft":"Microsoft",
  };
  let brand = (raw.Brand || "");
  for (const [k,v] of Object.entries(brandMap)) {
    if (brand.toLowerCase().startsWith(k.toLowerCase()) ||
        name.toLowerCase().startsWith(k.toLowerCase())) { brand=v; break; }
  }
  const nl = name.toLowerCase();
  let cpu = "";
  const cpuPats = [/core ultra \d+ \w+/,/core i\d+-\d+\w*/,/ryzen [\w]+ [\w]+ [\w]+/,
                   /apple m\d(?: pro| max)?/,/snapdragon [\w]+ [\w]+/,/a\d{2}(?: pro)?/];
  for (const p of cpuPats) { const m=nl.match(p); if(m){cpu=m[0];break;} }
  const ramM = name.match(/\/(\d{1,3})[Gg](?:[Bb])?/);
  const ssdM = name.match(/\/(\d+)([TtGg][Bb])/);
  return {
    brand, name: name.slice(0,55),
    price: `NT$${price.toLocaleString()}`,
    cpu: cpu || "規格詳見商品頁",
    ram: ramM ? `${ramM[1]}GB` : "—",

async function _updateAllProducts(progressCb) {
  const db = {
    laptop:[...PRODUCTS.laptop], phone:[...PRODUCTS.phone],
    tablet:[...PRODUCTS.tablet], desktop:[...PRODUCTS.desktop],
  };
  let added = 0;
  for (const [cat, queries] of Object.entries(_PCHOME_QUERIES)) {
    const existingNames = new Set(db[cat].map(p => p.name.toLowerCase().slice(0,25)));
    for (const q of queries) {
      if (progressCb) progressCb(`查詢：${q}…`);
      const raws = await _fetchPChome(q);
      for (const raw of raws) {
        const p = _parsePChomeProd(raw);
        if (!p) continue;
        const key = p.name.toLowerCase().slice(0,25);
        if ([...existingNames].some(n => n.includes(key) || key.includes(n))) continue;
        db[cat].push(p);
        existingNames.add(key);
        added++;
      }
    }
  }
  db._updated = new Date().toLocaleString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
  return { db, added };
}

function _applyProductDB(db) {
  if (db.laptop?.length)  PRODUCTS.laptop  = db.laptop;
  if (db.phone?.length)   PRODUCTS.phone   = db.phone;
  if (db.tablet?.length)  PRODUCTS.tablet  = db.tablet;
  if (db.desktop?.length) PRODUCTS.desktop = db.desktop;
  // Record prices for history tracking
  const allProds = [...(PRODUCTS.laptop||[]), ...(PRODUCTS.phone||[]), ...(PRODUCTS.tablet||[])];
  recordPrices(allProds);
  seedPriceHistory();
  const badge = document.getElementById("updateBadge");
  if (badge) {
    badge.style.display = "";
    badge.textContent = `⏱ ${db._updated || "已載入"}`;
  }
}

async function _applyDataJson() {
  // 讀取 fetch_prices.py 輸出的 data.json，更新精確價格
  try {
    const r = await fetch("./data.json");
    if (!r.ok) return 0;
    const data = await r.json();
    const prices = data.prices || {};
    const metaTs = data.meta?.updated_at || "";
    let updated = 0;
    const allProds = [...PRODUCTS.laptop, ...PRODUCTS.phone, ...PRODUCTS.tablet];
    for (const p of allProds) {
      const key = `${p.brand}|${p.name}`;
      const hit = prices[key];
      if (hit?.price && hit.price > 0) {
        const newPrice = `NT$${hit.price.toLocaleString()}`;
        if (newPrice !== p.price) {
          p.price = newPrice;
          updated++;
        }
      }
      // Also try fuzzy match by name substring
      if (!prices[key]) {
        for (const [k, v] of Object.entries(prices)) {
          if (v?.price > 0 && p.name.includes(k.split("|")[1]?.slice(0,15))) {
            p.price = `NT$${v.price.toLocaleString()}`;
            updated++;
            break;
          }
        }
      }
    }
    if (updated > 0) {
      recordPrices(allProds);
      const badge = document.getElementById("updateBadge");
      const ts = metaTs ? metaTs.slice(0,16).replace("T"," ") : "已更新";
      if (badge) { badge.style.display=""; badge.textContent=`⏱ ${ts}`; }
    }
    return updated;
  } catch { return 0; }
}

async function loadProductDB() {
  // 1. 先嘗試 localStorage
  try {
    const ls = localStorage.getItem(_LS_KEY);
    if (ls) {
      const db = JSON.parse(ls);
      if (db.laptop?.length) {
        _applyProductDB(db);
        await _applyDataJson();
        renderPage();
        return;
      }
    }
  } catch {}
  // 2. 嘗試讀取同目錄 products_db.json
  try {
    const r = await fetch("./products_db.json");
    if (r.ok) {
      const db = await r.json();
      if (db.laptop?.length) {
        _applyProductDB(db);
        try { localStorage.setItem(_LS_KEY, JSON.stringify(db)); } catch {}
        await _applyDataJson();
        renderPage();
        return;
      }
    }
  } catch {}
  // 3. 使用內建預設資料，仍嘗試載入 data.json 精確價格
  const n = await _applyDataJson();
  const badge = document.getElementById("updateBadge");
  if (badge) {
    badge.style.display = "";
    badge.textContent = n > 0 ? `✅ 已更新 ${n} 筆價格` : "📦 內建資料";
  }
  if (n > 0) renderPage();
}

async function doProductUpdate() {
  const btn = document.querySelector("#modalActions .modal-btn.primary");
  if (btn) { btn.disabled=true; btn.textContent="更新中…"; }
  const log = document.getElementById("updateProgress");
  const addLog = t => { if(log){ log.textContent+=t+"\n"; log.scrollTop=log.scrollHeight; } };
  addLog("🔄 開始從 PChome 抓取最新商品…");
  try {
    const { db, added } = await _updateAllProducts(t => addLog(t));
    PRODUCTS.laptop  = db.laptop;
    PRODUCTS.phone   = db.phone;
    PRODUCTS.tablet  = db.tablet;
    recordPrices([...db.laptop, ...db.phone, ...db.tablet]);
    try { localStorage.setItem(_LS_KEY, JSON.stringify(db)); } catch {}
    const badge = document.getElementById("updateBadge");
    if (badge) { badge.style.display=""; badge.textContent=`⏱ ${db._updated}`; }
    addLog(`\n✅ 完成！新增 ${added} 筆商品`);
    if (btn) { btn.disabled=false; btn.textContent="✅ 再次更新"; }
    if (currentStep===5) renderPage();
  } catch(e) {
    addLog(`\n❌ 更新失敗：${e.message}`);
    if (btn) { btn.disabled=false; btn.textContent="重試"; }
  }
}

function priceNum(priceStr) {
  const m = (priceStr||"").replace(/,/g,"").match(/\d+/);
  return m ? parseInt(m[0]) : 0;
}
function priceTag(priceStr) {
  const p = priceNum(priceStr);
  if (p < 20000) return {label:"🟢 入門價格", color:"var(--green)", bg:"#0A2018"};
  if (p < 35000) return {label:"🔵 中階行情", color:"var(--accent)", bg:"#0A1830"};
  if (p < 60000) return {label:"🟡 高階定價", color:"var(--orange)", bg:"#1E1800"};
  return {label:"🔴 旗艦售價", color:"var(--red)", bg:"#200808"};
}
function getPerfScores(p) {
  const spec = ((p.cpu||"")+" "+(p.gpu||"")+" "+(p.ram||"")+" "+(p.ssd||"")).toLowerCase();
  let office=0.75, game=0.30, edit=0.30;
  if (/ultra 7|ultra 9|m4|m3|ryzen 9|i9/.test(spec)) {office=1.0;edit=0.90;game=Math.max(game,0.60);}
  else if (/ultra 5|m2|ryzen 7|i7|r7/.test(spec)) {office=0.92;edit=0.75;game=Math.max(game,0.50);}
  else if (/ryzen 5|i5|r5|a17|a18|a19|snapdragon 8 elite/.test(spec)) {office=0.85;edit=0.55;game=Math.max(game,0.40);}
  else if (/i3|ryzen 3|exynos/.test(spec)) {office=0.70;edit=0.35;game=Math.max(game,0.25);}
  if (/rtx 5070 ti|rtx 5080|rtx 5090/.test(spec)) {game=1.0;edit=1.0;}
  else if (/rtx 5070|rtx 4090|rtx 4080/.test(spec)) {game=0.95;edit=0.95;}
  else if (/rtx 5060|rtx 4070/.test(spec)) {game=0.85;edit=0.80;}
  else if (/rtx 4060|rtx 3070/.test(spec)) {game=0.75;edit=0.70;}
  else if (/rtx|gtx/.test(spec)) {game=0.65;edit=0.60;}
  if (/64gb/.test(spec)) {edit=Math.min(edit+0.10,1.0);office=Math.min(office+0.05,1.0);}
  else if (/32gb/.test(spec)) {edit=Math.min(edit+0.05,1.0);office=Math.min(office+0.03,1.0);}
  return {office:Math.round(office*100)/100, game:Math.round(game*100)/100, edit:Math.round(edit*100)/100};
}
function getFreshness(p) {
  const spec = ((p.cpu||"")+" "+(p.gpu||"")).toLowerCase();
  if (/ultra 7|ultra 9|m4|m3|rtx 5|ryzen 9 9|a19|snapdragon 8 elite/.test(spec))
    return {emoji:"🟢", label:"當季新品，五年不落伍", color:"var(--green)", bg:"#0A2018", borderColor:"#00E5A066"};
  if (/ultra 5|m2|rtx 4|ryzen 7 9|ryzen 5 7|i7-13|i5-13|a18|a17|snapdragon 8 gen 3/.test(spec))
    return {emoji:"🟡", label:"主流世代，三年夠用", color:"#FFD700", bg:"#1E1800", borderColor:"#FFD70066"};
  return {emoji:"🔴", label:"規格偏舊，價格夠低再考慮", color:"var(--red)", bg:"#200808", borderColor:"#FF4D6D66"};
}
function getCompatScore(p, apps) {
  if (!apps.length) return {score:1.0, color:"var(--green)", text:"沒有特定需求，這台完全夠用！"};
  const scores = getPerfScores(p);
  const hasHeavyGame = apps.some(a => /3A|絕地/.test(a));
  const has4K = apps.some(a => /4K/.test(a));
  const hasAI = apps.some(a => /AI|機器學習/.test(a));
  let score = 1.0;
  if (hasHeavyGame) score = Math.min(score, scores.game);
  if (has4K) score = Math.min(score, scores.edit);
  if (hasAI) score = Math.min(score, scores.edit * 0.9);
  if (score >= 0.80) return {score, color:"var(--green)", text:"完全勝任！買這台不用擔心跑不動 ✅"};
  if (score >= 0.55) return {score, color:"var(--orange)", text:"大部分沒問題，少數重度任務需降低設定 ⚠️"};
  return {score, color:"var(--red)", text:"規格不足，跑起來可能會很痛苦 ❌"};
}

// ─── HANDLERS ───────────────────────────────────────────────
function attachPageHandlers() {
  // Option grid
  document.querySelectorAll(".option-grid").forEach(grid => {
    const key = grid.dataset.key;
    const next = parseInt(grid.dataset.next);
    grid.querySelectorAll(".option-card").forEach(card => {
      card.onclick = () => {
        answers[key] = card.dataset.val;
        goTo(next);
      };
    });
  });
  // App chips
  document.querySelectorAll(".app-chip").forEach(chip => {
    chip.onclick = () => {
      const app = chip.dataset.app;
      if (selectedApps.includes(app)) {
        selectedApps = selectedApps.filter(a => a!==app);
        chip.classList.remove("checked");
      } else {
        selectedApps.push(app);
        chip.classList.add("checked");
      }
      renderPage(); // re-render to update budget hint
    };
  });
  // Pref chips
  document.querySelectorAll(".pref-chips").forEach(row => {
    const key = row.dataset.pref;
    row.querySelectorAll(".pref-chip").forEach(chip => {
      chip.onclick = () => {
        const label = chip.dataset.label;
        if (userPrefs[key].includes(label)) {
          userPrefs[key] = userPrefs[key].filter(l=>l!==label);
          chip.classList.remove("active");
        } else {
          userPrefs[key].push(label);
          chip.classList.add("active");
        }
      };
    });
  });
  // Refresh compare bar
  if (currentStep === 5) updateCompareBar();
}

function switchTab(tab) {
  document.getElementById("listLaptop").className = "results-list" + (tab==="laptop"?" active":"");
  document.getElementById("listDesktop").className = "results-list" + (tab==="desktop"?" active":"");
  document.getElementById("tabLaptop").className = "tab-btn" + (tab==="laptop"?" active":"");
  document.getElementById("tabDesktop").className = "tab-btn" + (tab==="desktop"?" active":"");
}

// ─── COMPARE ────────────────────────────────────────────────
function findProduct(encodedName) {
  const name = decodeURIComponent(encodedName);
  const all = [...PRODUCTS.laptop, ...PRODUCTS.phone, ...PRODUCTS.tablet];
  return all.find(p => p.name === name);
}
function toggleCompare(encodedName) {
  const p = findProduct(encodedName);
  if (!p) return;
  const idx = compareList.findIndex(x=>x.name===p.name);
  if (idx>=0) {
    compareList.splice(idx,1);
  } else {
    if (compareList.length>=2) compareList.shift();
    compareList.push(p);
  }
  // Update button text
  const btn = document.getElementById(`cmpbtn-${encodedName}`);
  if (btn) {
    const inCmp = compareList.some(x=>x.name===p.name);
    btn.innerHTML = inCmp ? "✅ 已加入比較" : "⚡ 加入PK比較";
    btn.style.color = inCmp ? "var(--green)" : "var(--accent)";
  }
  updateCompareBar();
}
function updateCompareBar() {
  const bar = document.getElementById("compareBar");
  if (!bar) return;
  if (compareList.length===2) {
    bar.innerHTML = `<div class="compare-bar">
      <div class="compare-bar-text">⚡ PK：${compareList[0].name}  VS  ${compareList[1].name}</div>
      <button class="compare-go-btn" onclick="showCompare()">開始比較 →</button>
    </div>`;
  } else if (compareList.length===1) {
    bar.innerHTML = `<div style="background:var(--card2);border-radius:10px;padding:10px 16px;margin:0 24px 8px;font-size:12px;color:var(--accent)">
      已選 ${compareList[0].name}，再選一台開始PK比較
    </div>`;
  } else {
    bar.innerHTML = "";
  }
}
function showCompare() {
  if (compareList.length<2) return;
  const [a,b] = compareList;
  const sa = getPerfScores(a), sb = getPerfScores(b);
  const pa = priceNum(a.price), pb = priceNum(b.price);
  function cmpRow(label, aVal, bVal, biggerIsBetter=true) {
    const aWin = biggerIsBetter ? aVal>bVal : aVal<bVal;
    const bWin = biggerIsBetter ? bVal>aVal : bVal<aVal;
    return `<div class="compare-row">
      <div class="compare-val ${aWin?"compare-win":""}" style="color:${aWin?"var(--green)":"var(--text2)"}">${typeof aVal==="number"?Math.round(aVal*100)+"%":aVal}</div>
      <div class="compare-mid">${label}</div>
      <div class="compare-val ${bWin?"compare-win":""}" style="color:${bWin?"var(--green)":"var(--text2)"}">${typeof bVal==="number"?Math.round(bVal*100)+"%":bVal}</div>
    </div>`;
  }
  const summary = (pa<pb ? "左邊較便宜" : pb<pa ? "右邊較便宜" : "售價相當") + "，" +
    ((sa.game+sa.edit)>(sb.game+sb.edit) ? "左邊效能更強" : "右邊效能更強");
  const body = `<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:12px">
    <div class="compare-col">
      <div style="font-size:11px;color:var(--accent);font-weight:700">${a.brand}</div>
      <div style="font-size:12px;font-weight:700;color:var(--text)">${a.name}</div>
      <div style="font-size:14px;font-weight:700;color:var(--white)">${a.price}</div>
    </div>
    <div style="font-size:14px;font-weight:700;color:var(--text3);padding-top:16px">VS</div>
    <div class="compare-col">
      <div style="font-size:11px;color:var(--accent);font-weight:700">${b.brand}</div>
      <div style="font-size:12px;font-weight:700;color:var(--text)">${b.name}</div>
      <div style="font-size:14px;font-weight:700;color:var(--white)">${b.price}</div>
    </div>
  </div>
  ${cmpRow("文書辦公", sa.office, sb.office)}
  ${cmpRow("遊戲效能", sa.game, sb.game)}
  ${cmpRow("剪輯創作", sa.edit, sb.edit)}
  ${cmpRow("售價比較", pa, pb, false)}
  <div class="compare-row">
    <div class="compare-val">${a.battery||"—"}</div>
    <div class="compare-mid">電池續航</div>
    <div class="compare-val">${b.battery||"—"}</div>
  </div>
  <div class="compare-row">
    <div class="compare-val">${a.weight||"—"}</div>
    <div class="compare-mid">重量</div>
    <div class="compare-val">${b.weight||"—"}</div>
  </div>
  <div style="margin-top:10px;font-size:11px;color:var(--orange)">💡 ${summary}</div>`;
  showModal("⚡ PK 比較", body, [
    {text:"清除比較", cls:"modal-btn danger", onclick:"compareList=[];closeModal();updateCompareBar();"},
    {text:"關閉", cls:"modal-btn primary", onclick:"closeModal()"},
  ]);
}

function doShare(platform) {
  const text = "免費 3C 選購顧問，幫你找到最適合的裝置！捷啟智慧科技出品。";
  const enc = encodeURIComponent(text+"\n"+APP_URL);
  const encUrl = encodeURIComponent(APP_URL);
  const urls = {
    LINE: `https://social-plugins.line.me/lineit/share?url=${encUrl}&text=${encodeURIComponent(text)}`,
    Facebook: `https://www.facebook.com/sharer/sharer.php?u=${encUrl}`,
    Instagram: null,
    Threads: `https://www.threads.net/intent/post?text=${enc}`,
  };
  if (platform === "Instagram") {
    navigator.clipboard.writeText(text+"\n"+APP_URL).catch(()=>{});
    alert("📋 已複製！請開啟 Instagram 貼上分享文字。");
    return;
  }
  window.open(urls[platform], "_blank");
}

// ─── MODAL ──────────────────────────────────────────────────
function showModal(title, body, actions, maxWidth) {
  document.getElementById("modalTitle").innerHTML = title;
  document.getElementById("modalBody").innerHTML = body;
  document.getElementById("modalActions").innerHTML = actions.map(a =>
    `<button class="${a.cls}" onclick="${a.onclick}">${a.text}</button>`
  ).join("");
  document.getElementById("modalBox").style.maxWidth = maxWidth || "460px";
  document.getElementById("modalOverlay").classList.add("open");
}
function closeModal(event) {
  if (event && event.target !== document.getElementById("modalOverlay")) return;
  document.getElementById("modalOverlay").classList.remove("open");
}

// ─── THEME ──────────────────────────────────────────────────
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle("light-mode", !isDark);
  document.getElementById("themeBtn").textContent = isDark ? "🌙 深色" : "☀️ 淺色";
}
