name: 每日更新 3C 產品資料

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-products:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest products from PChome
        run: python fetch_products.py

      - name: Commit & push products.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp products.json /tmp/products_new.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/products_new.json products.json
          git add products.json
          git diff --cached --quiet || git commit -m "🔄 自動更新產品資料 $(date +'%Y-%m-%d')"
          git push
