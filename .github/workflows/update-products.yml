name: 每日更新 3C 產品資料

on:
  schedule:
    # 每天 UTC 00:00（台灣時間 08:00）自動跑
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 也可以在 GitHub Actions 頁面手動按「Run workflow」觸發

jobs:
  update-products:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # 允許 push 回 repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest products from PChome
        run: python fetch_products.py

      - name: Commit & push products.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add products.json
          git diff --cached --quiet || git commit -m "🔄 自動更新產品資料 $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
