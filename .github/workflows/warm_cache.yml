name: 生活優轉 暖機（每5分鐘）

on:
  schedule:
    - cron: '*/5 * * * *'   # 每 5 分鐘
  workflow_dispatch:          # 手動觸發

jobs:
  warm:
    runs-on: ubuntu-latest
    steps:
      - name: Warm TDX parking cache
        run: |
          curl -sf "https://3c-advisor.vercel.app/api/warm_cache" \
            --max-time 30 \
            -o /tmp/warm_result.json && cat /tmp/warm_result.json \
            || echo "warm_cache ping failed (non-critical)"
