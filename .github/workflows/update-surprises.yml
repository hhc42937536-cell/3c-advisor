name: 每日更新驚喜資料（新歌+優惠）

on:
  schedule:
    # 每天 UTC 22:00（台灣時間 06:00）自動跑
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  update-surprises:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Scrape 新歌 + 即時優惠
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: python line-bot/scrape_surprises.py

      - name: Commit & push surprise_cache.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp line-bot/surprise_cache.json /tmp/surprise_cache.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/surprise_cache.json line-bot/surprise_cache.json
          git add line-bot/surprise_cache.json
          git diff --cached --quiet || git commit -m "🎉 自動更新驚喜資料 $(date +'%Y-%m-%d')"
          git push
