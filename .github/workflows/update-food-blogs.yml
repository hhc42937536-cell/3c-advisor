name: 每日更新部落格美食快取

on:
  schedule:
    # 每天 UTC 22:30（台灣時間 06:30）
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  scrape-food-blogs:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 爬取部落格美食資料
        run: python line-bot/scrape_food_blogs.py

      - name: Commit & push food_blog_cache.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main
          cp line-bot/food_blog_cache.json /tmp/food_blog_cache.json
          git checkout -- .
          cp /tmp/food_blog_cache.json line-bot/food_blog_cache.json
          git add line-bot/food_blog_cache.json
          git diff --cached --quiet || git commit -m "🍽️ 自動更新部落格美食快取 $(date +'%Y-%m-%d')"
          git push
