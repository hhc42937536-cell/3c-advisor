name: 每週更新流行伴手禮（Serper）

on:
  schedule:
    # 每週六 22:00 UTC（台灣時間週日 06:00）
    - cron: '0 22 * * 6'
  workflow_dispatch:

jobs:
  scrape-trending:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 爬取 22 城市流行店家（Serper）
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: python line-bot/scrape_trending_serper.py

      - name: Commit & push trending_stores_cache.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main
          cp line-bot/trending_stores_cache.json /tmp/trending_stores_cache.json
          git checkout -- .
          cp /tmp/trending_stores_cache.json line-bot/trending_stores_cache.json
          git add line-bot/trending_stores_cache.json
          git diff --cached --quiet || git commit -m "🔥 自動更新流行伴手禮資料 $(date +'%Y-%m-%d')"
          git push
