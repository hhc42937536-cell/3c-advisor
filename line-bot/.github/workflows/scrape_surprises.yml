name: Scrape Surprises

on:
  schedule:
    - cron: '0 22 * * *'   # 每天 06:00 台灣時間（UTC 22:00 前一天）
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: refactor/modularize

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        working-directory: line-bot
        run: python scrape_surprises.py

      - name: Commit and push
        working-directory: line-bot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add surprise_cache.json
          if git diff --cached --quiet; then
            echo "surprise_cache.json 無變化，略過 commit"
          else
            git commit -m "chore: 自動更新 surprise_cache.json [skip ci]"
            git push origin HEAD:refactor/modularize
          fi
