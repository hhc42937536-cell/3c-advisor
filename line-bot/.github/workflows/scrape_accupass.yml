name: Scrape Accupass Activities

on:
  schedule:
    - cron: '0 14 * * 1,3,5'   # 週一三五 22:00 台灣時間（UTC 14:00）
  workflow_dispatch:         # 允許手動觸發

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write        # 允許 push 回 repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: refactor/modularize

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Python dependencies
        run: pip install selenium requests

      - name: Run scraper
        working-directory: line-bot
        run: python scrape_all.py

      - name: Commit and push updated cache
        working-directory: line-bot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add accupass_cache.json
          if git diff --cached --quiet; then
            echo "accupass_cache.json 無變化，略過 commit"
          else
            git commit -m "chore: 自動更新 accupass_cache.json [skip ci]"
            git push origin HEAD:refactor/modularize
          fi
