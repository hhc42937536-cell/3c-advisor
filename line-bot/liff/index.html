<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>生活優轉</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #1A1F3A;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #1A1F3A 0%, #2D3561 100%);
    padding: 20px 16px 16px;
    text-align: center;
    position: relative;
  }
  .header-icon { font-size: 32px; margin-bottom: 4px; }
  .header-title {
    color: #FFFFFF;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .header-sub {
    color: #8892B0;
    font-size: 12px;
    margin-top: 4px;
  }
  .header-tags {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 12px;
  }
  .tag {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .tag-food  { background: #FF6B3520; color: #FF9A7A; border: 1px solid #FF6B3540; }
  .tag-event { background: #5C6BC020; color: #9FA8DA; border: 1px solid #5C6BC040; }
  .tag-health{ background: #43A04720; color: #A5D6A7; border: 1px solid #43A04740; }

  /* ── Main Grid ── */
  .main {
    flex: 1;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .section-label {
    color: #8892B0;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  /* ── Feature Card ── */
  .card {
    background: #252B4E;
    border-radius: 16px;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease;
    border: 1px solid #ffffff10;
    position: relative;
    overflow: hidden;
    min-height: 110px;
    justify-content: center;
  }
  .card:active { transform: scale(0.95); background: #2D3561; }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 16px 16px 0 0;
  }
  .card-food::before   { background: linear-gradient(90deg, #FF6B35, #FF8C42); }
  .card-event::before  { background: linear-gradient(90deg, #5C6BC0, #7986CB); }
  .card-park::before   { background: linear-gradient(90deg, #26A69A, #4DB6AC); }
  .card-health::before { background: linear-gradient(90deg, #43A047, #66BB6A); }
  .card-money::before  { background: linear-gradient(90deg, #F9A825, #FFB300); }
  .card-tools::before  { background: linear-gradient(90deg, #546E7A, #78909C); }

  .card-img {
    width: 64px;
    height: 64px;
    object-fit: contain;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
  }
  .card-img-placeholder {
    width: 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }
  .card-name {
    color: #FFFFFF;
    font-size: 14px;
    font-weight: 700;
    text-align: center;
  }
  .card-desc {
    color: #8892B0;
    font-size: 10px;
    text-align: center;
    line-height: 1.4;
  }

  /* ── Small Tool Cards ── */
  .small-card {
    background: #252B4E;
    border-radius: 12px;
    padding: 10px 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: transform 0.15s ease;
    border: 1px solid #ffffff10;
  }
  .small-card:active { transform: scale(0.92); }
  .small-icon { font-size: 22px; }
  .small-name { color: #CCD6F6; font-size: 11px; font-weight: 600; }

  /* ── Share Banner ── */
  .share-banner {
    margin: 0 0 4px;
    background: linear-gradient(135deg, #1e3a5f 0%, #1a3a4a 100%);
    border: 1px solid #2a5f8f40;
    border-radius: 14px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .share-banner-text {
    flex: 1;
    color: #8ecae6;
    font-size: 12px;
    line-height: 1.5;
  }
  .share-banner-text strong {
    color: #FFFFFF;
    font-size: 13px;
    display: block;
    margin-bottom: 2px;
  }
  .share-btn {
    flex-shrink: 0;
    background: linear-gradient(135deg, #00b894, #00cec9);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease;
    white-space: nowrap;
  }
  .share-btn:active { transform: scale(0.93); opacity: 0.85; }

  /* ── Footer ── */
  .footer {
    padding: 12px 16px;
    text-align: center;
    color: #4A5280;
    font-size: 10px;
  }

  /* ── Loading ── */
  .loading {
    position: fixed; inset: 0;
    background: #1A1F3A;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 999;
  }
  .loading-icon { font-size: 48px; animation: pulse 1.2s ease-in-out infinite; }
  .loading-text { color: #8892B0; font-size: 14px; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.7; }
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- Loading 畫面 -->
<div class="loading" id="loading">
  <div class="loading-icon" id="loading-icon">✨</div>
  <div class="loading-text" id="loading-text">載入中...</div>
  <div id="loading-sub" style="color:#4A5280;font-size:12px;text-align:center;padding:0 32px;display:none"></div>
  <button id="loading-btn" onclick="manualLocationFallback()"
    style="display:none;margin-top:8px;padding:12px 24px;background:#26A69A;color:#fff;
           border:none;border-radius:24px;font-size:14px;font-weight:600;cursor:pointer">
    📍 改用手動選擇位置
  </button>
</div>

<!-- 主畫面 -->
<div id="app" class="hidden">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">✨</div>
    <div class="header-title">生活優轉</div>
    <div class="header-sub">讓每天的選擇更簡單</div>
    <div class="header-tags">
      <span class="tag tag-food">🍽️ 吃什麼</span>
      <span class="tag tag-event">🗓️ 週末活動</span>
      <span class="tag tag-health">💪 健康管理</span>
    </div>
  </div>

  <div class="main">
    <div class="section-label">主要功能</div>

    <!-- Row 1: 吃什麼 + 近期活動 -->
    <div class="grid-2">
      <div class="card card-food" onclick="autoLocateAndSend('今天吃什麼')">
        <div class="card-img-placeholder">🍜</div>
        <div class="card-name">吃什麼</div>
        <div class="card-desc">3秒決定<br>今天吃啥</div>
      </div>
      <div class="card card-event" onclick="autoLocateAndSend('近期活動')">
        <div class="card-img-placeholder">🗓️</div>
        <div class="card-name">近期活動</div>
        <div class="card-desc">周末<br>去哪玩</div>
      </div>
    </div>

    <!-- Row 2: 找車位 + 健康 -->
    <div class="grid-2">
      <div class="card card-park" id="parking-card" onclick="findParking()">
        <div class="card-img-placeholder">🅿️</div>
        <div class="card-name">找車位</div>
        <div class="card-desc" id="parking-desc">附近空位<br>即時查詢</div>
      </div>
      <div class="card card-health" onclick="send('健康小幫手')">
        <div class="card-img-placeholder">💪</div>
        <div class="card-name">健康</div>
        <div class="card-desc">BMI/睡眠<br>壓力紓解</div>
      </div>
    </div>

    <!-- Row 3: 金錢 + 工具箱 -->
    <div class="grid-2">
      <div class="card card-money" onclick="send('金錢小幫手')">
        <div class="card-img-placeholder">💰</div>
        <div class="card-name">金錢</div>
        <div class="card-desc">薪資/信用卡<br>保險規劃</div>
      </div>
      <div class="card card-tools" onclick="send('其他工具')">
        <div class="card-img-placeholder">🔧</div>
        <div class="card-name">工具箱</div>
        <div class="card-desc">3C/防詐<br>法律常識</div>
      </div>
    </div>

    <!-- 小工具列 -->
    <div class="section-label" style="margin-top:4px">快速工具</div>
    <div class="grid-3">
      <div class="small-card" onclick="autoLocateAndSend('天氣')">
        <div class="small-icon">🌤️</div>
        <div class="small-name">天氣</div>
      </div>
      <div class="small-card" onclick="send('防詐騙')">
        <div class="small-icon">🔍</div>
        <div class="small-name">防詐</div>
      </div>
      <div class="small-card" onclick="send('法律常識')">
        <div class="small-icon">⚖️</div>
        <div class="small-name">法律</div>
      </div>
    </div>
  </div>

  <!-- 分享橫幅 -->
  <div class="share-banner" id="share-banner">
    <div class="share-banner-text">
      <strong>📢 推薦給朋友</strong>
      吃什麼、找車位、近期活動…一鍵搞定
    </div>
    <button class="share-btn" onclick="shareBot()">分享 LINE</button>
  </div>

  <div class="footer">點選功能，Bot 會立即回覆 ✨</div>
</div>

<script>
const LIFF_ID = '2009774625-KwBrQAbV';
const LIFF_URL = 'https://liff.line.me/2009774625-KwBrQAbV';

async function shareBot() {
  // 只能在 LIFF 內呼叫
  if (!liff.isInClient()) {
    alert('請在 LINE App 內開啟才能分享');
    return;
  }

  const flexMessage = {
    type: 'flex',
    altText: '推薦你用生活優轉 🎉',
    contents: {
      type: 'bubble',
      size: 'kilo',
      header: {
        type: 'box',
        layout: 'vertical',
        backgroundColor: '#1A1F3A',
        paddingAll: '16px',
        contents: [
          {
            type: 'text',
            text: '✨ 生活優轉',
            color: '#FFFFFF',
            size: 'xl',
            weight: 'bold'
          },
          {
            type: 'text',
            text: '你的 AI 生活小幫手',
            color: '#8892B0',
            size: 'sm',
            margin: 'xs'
          }
        ]
      },
      body: {
        type: 'box',
        layout: 'vertical',
        backgroundColor: '#252B4E',
        paddingAll: '16px',
        spacing: 'sm',
        contents: [
          {
            type: 'box',
            layout: 'horizontal',
            spacing: 'sm',
            contents: [
              { type: 'text', text: '🍜', size: 'sm', flex: 0 },
              { type: 'text', text: '今天吃什麼', color: '#CCD6F6', size: 'sm', flex: 1 }
            ]
          },
          {
            type: 'box',
            layout: 'horizontal',
            spacing: 'sm',
            contents: [
              { type: 'text', text: '🅿️', size: 'sm', flex: 0 },
              { type: 'text', text: '附近車位即時查詢', color: '#CCD6F6', size: 'sm', flex: 1 }
            ]
          },
          {
            type: 'box',
            layout: 'horizontal',
            spacing: 'sm',
            contents: [
              { type: 'text', text: '🗓️', size: 'sm', flex: 0 },
              { type: 'text', text: '近期活動 / 天氣穿搭', color: '#CCD6F6', size: 'sm', flex: 1 }
            ]
          },
          {
            type: 'box',
            layout: 'horizontal',
            spacing: 'sm',
            contents: [
              { type: 'text', text: '💪', size: 'sm', flex: 0 },
              { type: 'text', text: '健康 / 金錢 / 防詐騙', color: '#CCD6F6', size: 'sm', flex: 1 }
            ]
          }
        ]
      },
      footer: {
        type: 'box',
        layout: 'vertical',
        backgroundColor: '#1A1F3A',
        paddingAll: '12px',
        contents: [
          {
            type: 'button',
            style: 'primary',
            color: '#26A69A',
            height: 'sm',
            action: {
              type: 'uri',
              label: '立即體驗 →',
              uri: LIFF_URL
            }
          }
        ]
      }
    }
  };

  try {
    const result = await liff.shareTargetPicker([flexMessage], { isMultiple: true });
    if (result) {
      // 分享成功
      const btn = document.querySelector('.share-btn');
      btn.textContent = '✅ 已分享！';
      btn.style.background = '#43A047';
      setTimeout(() => {
        btn.textContent = '分享 LINE';
        btn.style.background = '';
      }, 2500);
    }
  } catch (e) {
    if (e.code === 'FORBIDDEN') {
      alert('請在 LINE App 內開啟才能使用分享功能');
    }
    // 使用者取消 → 不提示
  }
}

async function send(message) {
  try {
    await liff.sendMessages([{ type: 'text', text: message }]);
    liff.closeWindow();
  } catch (e) {
    alert('會發送：' + message);
  }
}

// 找車位：自動抓 GPS → 直接傳位置給 Bot（不需要手動按「分享」）
function findParking() {
  const card = document.getElementById('parking-card');
  const desc = document.getElementById('parking-desc');

  if (!navigator.geolocation) {
    send('找車位');
    return;
  }

  // 顯示定位中
  card.style.opacity = '0.6';
  card.style.pointerEvents = 'none';
  desc.innerHTML = '定位中...<br>請稍候';

  // 5 秒後若還沒回應，恢復卡片讓使用者重試
  const fallbackTimer = setTimeout(() => {
    resetParkingCard();
    desc.innerHTML = '定位逾時<br>請再試一次';
    setTimeout(() => { desc.innerHTML = '附近空位<br>即時查詢'; }, 2000);
  }, 8000);

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      clearTimeout(fallbackTimer);
      const { latitude, longitude } = pos.coords;
      desc.innerHTML = '傳送中...<br>即將顯示結果';
      try {
        await liff.sendMessages([{
          type: 'location',
          title: '我的目前位置',
          address: '目前位置',
          latitude: latitude,
          longitude: longitude
        }]);
        liff.closeWindow();
      } catch (e) {
        // LIFF sendMessages 失敗（例如外部瀏覽器）→ fallback
        resetParkingCard();
        send('找車位');
      }
    },
    (err) => {
      clearTimeout(fallbackTimer);
      resetParkingCard();
      send('找車位');
    },
    { timeout: 8000, maximumAge: 60000, enableHighAccuracy: false }
  );
}

function resetParkingCard() {
  const card = document.getElementById('parking-card');
  const desc = document.getElementById('parking-desc');
  card.style.opacity = '1';
  card.style.pointerEvents = '';
  desc.innerHTML = '附近空位<br>即時查詢';
}

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });

    // 若帶有 ?action=parking → 直接自動定位，不顯示主選單
    const params = new URLSearchParams(window.location.search);
    if (params.get('action') === 'parking') {
      document.getElementById('loading').querySelector('.loading-text').textContent = '定位中，請稍候...';
      autoFindParking();
      return;
    }

    if (params.get('action') === 'morning') {
      autoLocateMorningCity();
      return;
    }

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');

    // shareTargetPicker 只能在 LINE App 內使用，外部瀏覽器隱藏分享橫幅
    if (!liff.isInClient()) {
      const banner = document.getElementById('share-banner');
      if (banner) banner.style.display = 'none';
    }
  } catch (e) {
    document.getElementById('loading').innerHTML =
      '<div style="color:#ff6b6b;padding:20px;text-align:center">載入失敗，請重新開啟</div>';
  }
}

function setLoadingState(icon, text, sub, showBtn) {
  document.getElementById('loading-icon').textContent = icon;
  document.getElementById('loading-text').textContent = text;
  const subEl = document.getElementById('loading-sub');
  const btnEl = document.getElementById('loading-btn');
  if (sub) { subEl.textContent = sub; subEl.style.display = 'block'; }
  else { subEl.style.display = 'none'; }
  btnEl.style.display = showBtn ? 'block' : 'none';
}

// 從 Bot 連結直接觸發（不顯示主選單）
function autoFindParking() {
  // 手動按鈕「從一開始」就顯示，GPS 慢或無法取得時使用者不會卡住
  setLoadingState('📡', '定位中，請稍候...', 'GPS 取得位置中，或點下方手動選擇', true);
  const btn = document.getElementById('loading-btn');
  btn.textContent = '📍 手動選擇位置';
  btn.onclick = manualLocationFallback;

  if (!navigator.geolocation) {
    setLoadingState('⚠️', '裝置不支援定位', '請改用手動選擇位置', true);
    btn.textContent = '📍 手動選擇位置';
    btn.onclick = manualLocationFallback;
    return;
  }

  let resolved = false;

  // 保險用的 JS timer：10 秒後若 GPS 完全沒回應，更新提示文字
  const hardTimer = setTimeout(() => {
    if (!resolved) {
      setLoadingState('⏱', '定位逾時', '請改用手動選擇位置', true);
      btn.textContent = '📍 手動選擇位置';
      btn.onclick = manualLocationFallback;
    }
  }, 10000);

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      resolved = true;
      clearTimeout(hardTimer);
      const { latitude, longitude } = pos.coords;
      setLoadingState('🔍', '找附近停車場中...', '', false);
      try {
        await liff.sendMessages([{
          type: 'location',
          title: '我的目前位置',
          address: '目前位置',
          latitude: latitude,
          longitude: longitude
        }]);
        setLoadingState('✅', '已找到位置！', '稍後回到對話查看結果', false);
        setTimeout(() => liff.closeWindow(), 600);
      } catch (e) {
        try {
          await liff.sendMessages([{
            type: 'text',
            text: `__parking__:${latitude},${longitude}`
          }]);
          setLoadingState('✅', '已找到位置！', '稍後回到對話查看結果', false);
          setTimeout(() => liff.closeWindow(), 600);
        } catch (e2) {
          setLoadingState('⚠️', '請重新開啟此連結', '首次使用需重新授權', false);
          setTimeout(() => liff.closeWindow(), 2000);
        }
      }
    },
    (err) => {
      resolved = true;
      clearTimeout(hardTimer);
      if (err.code === 1) {
        setLoadingState('🔒', '定位權限未開啟', '', false);
        openLocationSettings();
      } else {
        setLoadingState('⚠️', '定位失敗，請手動選擇', '', true);
        btn.textContent = '📍 手動選擇位置';
        btn.onclick = manualLocationFallback;
      }
    },
    { timeout: 10000, maximumAge: 0, enableHighAccuracy: false }
  );
}

function openLocationSettings() {
  // iOS: 直接跳到 app 設定頁（開啟位置權限）
  // app-settings: 在 WKWebView (LINE) 上會開啟 iOS 設定 → LINE → 位置
  try {
    window.location.href = 'app-settings:';
  } catch(e) {}

  // 同時更新畫面，讓使用者知道要做什麼
  setTimeout(() => {
    setLoadingState('🔒', '請開啟 LINE 定位權限', '設定 → LINE → 位置 → 使用 App 期間', true);
    document.getElementById('loading-btn').textContent = '✅ 我已開啟，重新定位';
    document.getElementById('loading-btn').onclick = () => autoFindParking();
  }, 300);
}

function manualLocationFallback() {
  window.location.href = 'https://line.me/R/nv/location';
}

// ── 共用：GPS 座標 → 台灣縣市名 ──────────────────────────────
async function reverseGeocodeCity(latitude, longitude) {
  const resp = await fetch(
    `https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json&accept-language=zh-TW`,
    { headers: { 'User-Agent': 'LivingBetterBot/1.0' } }
  );
  const data = await resp.json();
  const addr = data.address || {};
  const raw = addr.city || addr.county || addr.state_district || addr.state || '';
  return raw.replace(/臺/g, '台').replace(/[市縣]$/, '');
}

// ── 共用：自動定位 → 傳送城市+動作給 Bot ────────────────────
// action: '天氣' / '今天吃什麼' / '近期活動' 等
function autoLocateAndSend(action) {
  // 蓋上全屏 loading（隱藏主選單）
  document.getElementById('app').classList.add('hidden');
  document.getElementById('loading').classList.remove('hidden');
  setLoadingState('📡', '自動定位中...', '取得位置後立即開啟', false);

  // 5 秒後若還沒拿到位置，顯示「跳過」按鈕（不強制中斷 GPS）
  const fallbackTimer = setTimeout(() => {
    const btn = document.getElementById('loading-btn');
    btn.textContent = '⏭ 跳過定位，直接開啟';
    btn.onclick = () => {
      clearTimeout(fallbackTimer);
      liff.sendMessages([{ type: 'text', text: action }])
        .then(() => liff.closeWindow())
        .catch(() => liff.closeWindow());
    };
    btn.style.display = 'block';
  }, 5000);

  if (!navigator.geolocation) {
    clearTimeout(fallbackTimer);
    send(action);
    return;
  }

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      clearTimeout(fallbackTimer);
      try {
        const city = await reverseGeocodeCity(pos.coords.latitude, pos.coords.longitude);
        const msg = city ? `__city_action__:${city}:${action}` : action;
        await liff.sendMessages([{ type: 'text', text: msg }]);
      } catch (e) {
        await liff.sendMessages([{ type: 'text', text: action }]).catch(() => {});
      }
      liff.closeWindow();
    },
    (err) => {
      clearTimeout(fallbackTimer);
      // 權限被拒或其他錯誤 → 直接送動作，Bot 用已存城市或顯示選單
      liff.sendMessages([{ type: 'text', text: action }])
        .then(() => liff.closeWindow())
        .catch(() => liff.closeWindow());
    },
    { timeout: 8000, maximumAge: 0, enableHighAccuracy: false }
  );
}

// 早安自動定位城市（GPS → Nominatim 反查 → 傳回 Bot）
function autoLocateMorningCity() {
  setLoadingState('🌅', '偵測所在城市...', '正在取得你的 GPS 位置', false);

  if (!navigator.geolocation) {
    setLoadingState('⚠️', '裝置不支援定位', '請回到對話手動選擇城市', true);
    document.getElementById('loading-btn').textContent = '關閉';
    document.getElementById('loading-btn').onclick = () => liff.closeWindow();
    return;
  }

  const fallbackTimer = setTimeout(() => {
    const btn = document.getElementById('loading-btn');
    btn.textContent = '關閉';
    btn.onclick = () => liff.closeWindow();
    btn.style.display = 'block';
  }, 8000);

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      clearTimeout(fallbackTimer);
      const { latitude, longitude } = pos.coords;
      setLoadingState('🔍', '查詢所在縣市...', '', false);
      try {
        const city = await reverseGeocodeCity(latitude, longitude);
        if (!city) throw new Error('無法解析城市');
        setLoadingState('✅', `偵測到：${city}`, '正在載入早安資訊...', false);
        await liff.sendMessages([{ type: 'text', text: `__morning_city__:${city}` }]);
        setTimeout(() => liff.closeWindow(), 600);
      } catch (e) {
        setLoadingState('⚠️', '無法查詢城市', '請回到對話手動選擇', true);
        document.getElementById('loading-btn').textContent = '關閉';
        document.getElementById('loading-btn').onclick = () => liff.closeWindow();
      }
    },
    (err) => {
      clearTimeout(fallbackTimer);
      if (err.code === 1) {
        setLoadingState('🔒', '定位權限未開啟', '', false);
        openLocationSettings();
        setTimeout(() => {
          document.getElementById('loading-btn').onclick = () => autoLocateMorningCity();
        }, 350);
      } else {
        setLoadingState('⚠️', '定位失敗，請手動選擇', '', true);
        document.getElementById('loading-btn').textContent = '關閉';
        document.getElementById('loading-btn').onclick = () => liff.closeWindow();
      }
    },
    { timeout: 10000, maximumAge: 60000, enableHighAccuracy: false }
  );
}

async function sendAndClose(message) {
  try {
    await liff.sendMessages([{ type: 'text', text: message }]);
    liff.closeWindow();
  } catch (e) {
    liff.closeWindow();
  }
}

init();
